<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>㈜위드프레쉬 생산일보 ERP</title>
<style>
  :root {
    --navy:#0d2137;--navy2:#1a3a5c;--blue:#1e6fb5;--blue-lt:#e8f2fb;
    --teal:#0d8a72;--teal-lt:#e4f5f1;--amber:#d4820a;--amber-lt:#fef3e0;
    --red:#c0392b;--red-lt:#fdecea;
    --g1:#f7f8fa;--g2:#eef0f3;--g3:#d0d4db;--g4:#8c95a3;--g5:#3d4551;
    --text:#1a2130;--white:#fff;--r:8px;--sh:0 2px 8px rgba(0,0,0,.08);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:var(--g1);color:var(--text);font-size:14px;line-height:1.6}

  /* 로그인 */
  #login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--navy),var(--navy2))}
  .login-box{background:#fff;border-radius:16px;padding:48px 40px;width:360px;box-shadow:0 4px 20px rgba(0,0,0,.15)}
  .login-logo{text-align:center;margin-bottom:32px}
  .login-logo .co{font-size:12px;color:var(--g4);letter-spacing:.05em}
  .login-logo .title{font-size:20px;font-weight:700;color:var(--navy);margin-top:4px}
  .login-logo .sub{font-size:11px;color:var(--teal);margin-top:2px;font-weight:600;letter-spacing:.08em}
  .fg{margin-bottom:16px}
  .fg label{display:block;font-size:12px;font-weight:600;color:var(--g5);margin-bottom:6px}
  .fg input{width:100%;padding:10px 14px;border:1.5px solid var(--g3);border-radius:var(--r);font-size:14px;outline:none;transition:border-color .2s}
  .fg input:focus{border-color:var(--blue)}
  .btn-login{width:100%;padding:12px;background:var(--navy);color:#fff;border:none;border-radius:var(--r);font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
  .btn-login:hover{background:var(--navy2)}
  .login-err{color:var(--red);font-size:12px;text-align:center;margin-top:10px;min-height:18px}

  /* 앱 */
  #app{display:none;min-height:100vh;flex-direction:column}
  .topbar{background:var(--navy);color:#fff;padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2)}
  .topbar-logo{font-size:16px;font-weight:700}
  .topbar-logo span{color:#64b5f6}
  .topbar-nav{display:flex;gap:4px;margin-left:16px}
  .nav-btn{padding:6px 14px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-weight:500;color:rgba(255,255,255,.7);background:transparent;transition:all .15s}
  .nav-btn:hover{background:rgba(255,255,255,.1);color:#fff}
  .nav-btn.active{background:var(--blue);color:#fff}
  .user-badge{font-size:12px;color:rgba(255,255,255,.7);background:rgba(255,255,255,.1);padding:4px 10px;border-radius:20px}
  .btn-logout{font-size:12px;color:rgba(255,255,255,.6);background:transparent;border:1px solid rgba(255,255,255,.2);padding:4px 10px;border-radius:6px;cursor:pointer}
  .btn-logout:hover{color:#fff;border-color:rgba(255,255,255,.5)}

  /* 메인 */
  .main{flex:1;padding:24px;max-width:1300px;margin:0 auto;width:100%}
  .page{display:none}.page.active{display:block}

  /* 카드 */
  .card{background:#fff;border-radius:var(--r);box-shadow:var(--sh);margin-bottom:16px}
  .card-header{padding:14px 20px;border-bottom:1px solid var(--g2);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
  .card-title{font-size:15px;font-weight:700;color:var(--navy)}
  .card-body{padding:20px}

  /* 버튼 */
  .btn{padding:7px 14px;border-radius:var(--r);border:none;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:5px}
  .btn-primary{background:var(--blue);color:#fff}.btn-primary:hover{background:#1558a0}
  .btn-success{background:var(--teal);color:#fff}.btn-success:hover{background:#0a7060}
  .btn-danger{background:var(--red);color:#fff}.btn-danger:hover{background:#a93226}
  .btn-outline{background:#fff;color:var(--navy);border:1.5px solid var(--g3)}.btn-outline:hover{border-color:var(--blue);color:var(--blue)}
  .btn-print{background:var(--g5);color:#fff}.btn-print:hover{background:var(--navy)}
  .btn-sm{padding:4px 10px;font-size:12px}
  .btn:disabled{opacity:.4;cursor:not-allowed}

  /* 필터 */
  .filter-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .filter-row input,.filter-row select{padding:7px 12px;border:1.5px solid var(--g3);border-radius:var(--r);font-size:13px;outline:none}
  .filter-row input:focus,.filter-row select:focus{border-color:var(--blue)}

  /* 배지 */
  .badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
  .badge-pending{background:var(--g2);color:var(--g5)}
  .badge-waiting{background:var(--amber-lt);color:var(--amber)}
  .badge-done{background:var(--teal-lt);color:var(--teal)}
  .badge-rejected{background:var(--red-lt);color:var(--red)}

  /* 일보 목록 */
  .ilbo-list{display:flex;flex-direction:column;gap:6px}
  .ilbo-item{border:1.5px solid var(--g2);border-radius:var(--r);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:all .15s;background:#fff}
  .ilbo-item:hover{border-color:var(--blue);box-shadow:var(--sh)}
  .ilbo-date{font-size:15px;font-weight:700;color:var(--navy)}
  .ilbo-dow{font-size:12px;color:var(--g4);margin-left:10px}
  .month-divider{padding:10px 4px 4px;font-size:12px;font-weight:700;color:var(--g4);letter-spacing:.05em;border-top:1px solid var(--g2);margin-top:4px}

  /* 결재선 */
  .approval-bar{display:flex;border:1.5px solid var(--g3);border-radius:var(--r);overflow:hidden;margin-bottom:16px}
  .ap-step{flex:1;padding:12px 16px;text-align:center;border-right:1px solid var(--g3)}
  .ap-step:last-child{border-right:none}
  .ap-step .role{font-size:11px;color:var(--g4);margin-bottom:3px}
  .ap-step .name{font-size:13px;font-weight:700;color:var(--navy)}
  .ap-step .status{font-size:11px;margin-top:3px}
  .ap-step.done{background:var(--teal-lt)}
  .ap-step.waiting{background:var(--amber-lt)}
  .ap-step.pending{background:var(--g1)}

  /* 테이블 */
  .tbl-wrap{overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:13px}
  thead th{background:var(--navy);color:#fff;padding:9px 10px;text-align:center;font-weight:600;white-space:nowrap;font-size:12px}
  tbody tr:nth-child(even){background:var(--g1)}
  tbody tr:hover{background:var(--blue-lt)}
  tbody td{padding:7px 10px;border-bottom:1px solid var(--g2);text-align:center;white-space:nowrap}
  tbody td.tl{text-align:left}
  tbody td.tr{text-align:right}
  .lot-link{color:var(--blue);font-weight:600;cursor:pointer;text-decoration:none;border-bottom:1px dashed var(--blue)}
  .lot-link:hover{color:var(--navy)}

  /* LOT 모달 */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
  .modal-box{background:#fff;border-radius:12px;width:100%;max-width:700px;max-height:85vh;display:flex;flex-direction:column;box-shadow:0 8px 32px rgba(0,0,0,.2)}
  .modal-header{padding:16px 20px;border-bottom:1px solid var(--g2);display:flex;align-items:center;justify-content:space-between}
  .modal-title{font-size:16px;font-weight:700;color:var(--navy)}
  .modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--g4);line-height:1;padding:4px}
  .modal-close:hover{color:var(--navy)}
  .modal-body{padding:20px;overflow-y:auto;flex:1}

  /* LOT 타임라인 */
  .lot-summary{display:flex;gap:16px;margin-bottom:16px;flex-wrap:wrap}
  .lot-sum-item{padding:8px 16px;border-radius:var(--r);font-size:13px;font-weight:600}
  .sum-입고{background:var(--blue-lt);color:var(--blue)}
  .sum-생산{background:var(--teal-lt);color:var(--teal)}
  .sum-투입{background:var(--amber-lt);color:var(--amber)}
  .sum-출고{background:var(--red-lt);color:var(--red)}
  .timeline{position:relative;padding-left:28px}
  .timeline::before{content:'';position:absolute;left:8px;top:0;bottom:0;width:2px;background:var(--g3)}
  .tl-node{position:relative;margin-bottom:12px;background:#fff;border:1.5px solid var(--g2);border-radius:var(--r);padding:12px 14px}
  .tl-node::before{content:'';position:absolute;left:-22px;top:16px;width:12px;height:12px;border-radius:50%;border:2px solid #fff}
  .tl-node.t입고::before{background:var(--blue)}
  .tl-node.t생산::before{background:var(--teal)}
  .tl-node.t투입::before{background:var(--amber)}
  .tl-node.t출고::before{background:var(--red)}
  .tl-top{display:flex;align-items:center;gap:8px;margin-bottom:4px}
  .tl-type{font-size:11px;font-weight:700;padding:2px 7px;border-radius:4px}
  .t입고 .tl-type{background:var(--blue-lt);color:var(--blue)}
  .t생산 .tl-type{background:var(--teal-lt);color:var(--teal)}
  .t투입 .tl-type{background:var(--amber-lt);color:var(--amber)}
  .t출고 .tl-type{background:var(--red-lt);color:var(--red)}
  .tl-date{font-size:12px;color:var(--g4)}
  .tl-main{font-size:14px;font-weight:600;color:var(--navy)}
  .tl-detail{font-size:12px;color:var(--g5);margin-top:3px}

  /* 로딩 */
  .loading{text-align:center;padding:40px;color:var(--g4)}
  .spinner{display:inline-block;width:22px;height:22px;border:3px solid var(--g3);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:10px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .empty{text-align:center;padding:32px;color:var(--g4)}

  /* 인쇄 */
  @media print{
    .topbar,.filter-row,.btn,.approval-bar,#lot-page,.modal-overlay{display:none!important}
    .card{box-shadow:none;border:1px solid #ccc;page-break-inside:avoid}
    .print-hd{display:block!important}
    body{background:#fff}
    thead th{background:#333!important;-webkit-print-color-adjust:exact}
  }
  .print-hd{display:none;text-align:center;margin-bottom:16px}
  .print-hd h2{font-size:18px;font-weight:700}
  .print-hd p{font-size:12px;color:#666;margin-top:3px}

  /* 상세 헤더 */
  .detail-hd{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px}
  .detail-title{font-size:17px;font-weight:700;color:var(--navy);margin-top:6px}
  .detail-acts{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
</style>
</head>
<body>

<!-- 로그인 -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <div class="co">㈜위드프레쉬</div>
      <div class="title">생산일보 ERP</div>
      <div class="sub">PRODUCTION DAILY REPORT</div>
    </div>
    <div class="fg"><label>아이디</label>
      <input type="text" id="inp-id" placeholder="아이디" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div class="fg"><label>비밀번호</label>
      <input type="password" id="inp-pw" placeholder="비밀번호" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn-login" onclick="doLogin()">로그인</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- 앱 -->
<div id="app">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:4px">
      <div class="topbar-logo">위드프레쉬 <span>ERP</span></div>
      <div class="topbar-nav">
        <button class="nav-btn active" id="nav-ilbo" onclick="showPage('ilbo')">📋 일보 결재</button>
        <button class="nav-btn" id="nav-lot" onclick="showPage('lot')">🔍 LOT 추적</button>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <span class="user-badge" id="user-badge"></span>
      <button class="btn-logout" onclick="doLogout()">로그아웃</button>
    </div>
  </div>

  <div class="main">

    <!-- 일보 페이지 -->
    <div class="page active" id="ilbo-page">

      <!-- 목록 -->
      <div id="ilbo-list-view">
        <div class="card">
          <div class="card-header">
            <span class="card-title">📋 일보 목록</span>
            <div class="filter-row">
              <select id="filter-mode" onchange="toggleFilter()">
                <option value="all">전체 기간</option>
                <option value="month">월별 조회</option>
              </select>
              <input type="month" id="filter-month" style="display:none">
              <button class="btn btn-outline" onclick="loadList()">조회</button>
            </div>
          </div>
          <div class="card-body">
            <div id="list-body"><div class="loading"><div class="spinner"></div><br>불러오는 중...</div></div>
          </div>
        </div>
      </div>

      <!-- 상세 -->
      <div id="ilbo-detail-view" style="display:none">
        <div class="detail-hd">
          <div>
            <button class="btn btn-outline btn-sm" onclick="showList()">← 목록</button>
            <div class="detail-title" id="detail-title"></div>
          </div>
          <div class="detail-acts" id="detail-acts"></div>
        </div>

        <!-- 결재선 -->
        <div class="approval-bar">
          <div class="ap-step" id="ap1">
            <div class="role">작성자</div>
            <div class="name">김현우 공장장</div>
            <div class="status" id="ap1-st">-</div>
          </div>
          <div class="ap-step" id="ap2">
            <div class="role">대표이사</div>
            <div class="name">전경진 대표</div>
            <div class="status" id="ap2-st">-</div>
          </div>
        </div>

        <div class="print-hd">
          <h2>생산 및 물류일보</h2>
          <p id="print-date"></p><p>㈜위드프레쉬</p>
        </div>

        <div class="card">
          <div class="card-header"><span class="card-title">표 1. 원료·부재료·반제품 매입 및 투입내역</span></div>
          <div class="card-body"><div class="tbl-wrap"><table>
            <thead><tr><th>구분</th><th>품목코드</th><th>품목명</th><th>LOT번호</th><th>규격</th><th>전일재고</th><th>입고</th><th>생산</th><th>투입</th><th>출고</th><th>현재고</th><th>비고</th></tr></thead>
            <tbody id="tb1"></tbody>
          </table></div></div>
        </div>

        <div class="card">
          <div class="card-header"><span class="card-title">표 2. 당일 생산내역</span></div>
          <div class="card-body"><div class="tbl-wrap"><table>
            <thead><tr><th>구분</th><th>품목코드</th><th>품목명</th><th>LOT번호</th><th>규격</th><th>전일재고</th><th>입고</th><th>생산</th><th>투입</th><th>출고</th><th>현재고</th><th>비고</th></tr></thead>
            <tbody id="tb2"></tbody>
          </table></div></div>
        </div>

        <div class="card">
          <div class="card-header"><span class="card-title">표 3. 제품 출고내역</span></div>
          <div class="card-body"><div class="tbl-wrap"><table>
            <thead><tr><th>구분</th><th>품목코드</th><th>품목명</th><th>LOT번호</th><th>규격</th><th>전일재고</th><th>입고</th><th>생산</th><th>투입</th><th>출고</th><th>현재고</th><th>비고</th></tr></thead>
            <tbody id="tb3"></tbody>
          </table></div></div>
        </div>
      </div>
    </div>

    <!-- LOT 추적 페이지 -->
    <div class="page" id="lot-page">
      <div class="card">
        <div class="card-header"><span class="card-title">🔍 LOT 추적 조회</span></div>
        <div class="card-body">
          <div class="filter-row">
            <input type="text" id="lot-inp" placeholder="LOT번호 입력 (예: R260527, S260601, P260603)" style="width:340px"
              onkeydown="if(event.key==='Enter')searchLot(document.getElementById('lot-inp').value)">
            <button class="btn btn-primary" onclick="searchLot(document.getElementById('lot-inp').value)">🔍 역추적 조회</button>
          </div>
          <div id="lot-result"></div>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- LOT 모달 -->
<div class="modal-overlay" id="lot-modal" style="display:none" onclick="if(event.target===this)closeLotModal()">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">LOT 추적</div>
      <button class="modal-close" onclick="closeLotModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
const FB = 'https://widfresh-erplot-default-rtdb.asia-southeast1.firebasedatabase.app';

const ACCOUNTS = {
  'admin': {pw:'wf2024!', name:'김현우 공장장', role:'admin'},
  'ceo':   {pw:'ceo2024!', name:'전경진 대표', role:'ceo'},
  'qc':    {pw:'qc1234', name:'QC 열람', role:'qc'}
};

let CU = null; // 현재 사용자
let CD = null; // 현재 날짜
let CA = null; // 현재 결재상태
let allDB = null; // 전체 수불DB 캐시

// ── 로그인 ──
function doLogin() {
  const id = document.getElementById('inp-id').value.trim();
  const pw = document.getElementById('inp-pw').value;
  const acc = ACCOUNTS[id];
  if (!acc || acc.pw !== pw) {
    document.getElementById('login-err').textContent = '아이디 또는 비밀번호가 올바르지 않습니다.';
    return;
  }
  CU = {id, ...acc};
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('user-badge').textContent = acc.name;
  const now = new Date();
  document.getElementById('filter-month').value =
    now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0');
  // DB 로딩 완료 후 목록 표시
  document.getElementById('list-body').innerHTML = '<div class="loading"><div class="spinner"></div><br>수불DB 로딩 중... (잠시 기다려주세요)</div>';
  loadDB().then(() => {
    loadList();
  });
}

function doLogout() {
  CU = null; allDB = null;
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('inp-id').value = '';
  document.getElementById('inp-pw').value = '';
}

// ── 수불DB 전체 로드 (배치별 병렬 로드) ──
async function loadDB() {
  allDB = [];
  try {
    // 1단계: 배치 목록 확인
    const idxRes = await fetch(`${FB}/수불DB.json?shallow=true`);
    const idxData = await idxRes.json();
    if (!idxData) { console.log('수불DB 없음'); return; }

    const batchKeys = Object.keys(idxData).sort((a,b) => {
      const na = parseInt(a.replace(/[^0-9]/g,'')) || 0;
      const nb = parseInt(b.replace(/[^0-9]/g,'')) || 0;
      return na - nb;
    });

    console.log('배치 목록:', batchKeys);

    // 2단계: 모든 배치 병렬 로드 (Promise.all)
    const promises = batchKeys.map(bk =>
      fetch(`${FB}/수불DB/${bk}.json`)
        .then(r => r.json())
        .catch(() => null)
    );

    const results = await Promise.all(promises);

    results.forEach(batch => {
      if (!batch) return;
      Object.values(batch).forEach(row => {
        if (row && row.날짜) allDB.push(row);
      });
    });

    console.log('수불DB 로드 완료:', allDB.length, '건');
  } catch(e) {
    console.error('loadDB 오류:', e);
    allDB = [];
  }
}

// ── 일보 목록 (DB에서 날짜 추출) ──
async function loadList() {
  const body = document.getElementById('list-body');
  body.innerHTML = '<div class="loading"><div class="spinner"></div><br>불러오는 중...</div>';

  if (!allDB || allDB.length === 0) {
    body.innerHTML = '<div class="loading"><div class="spinner"></div><br>수불DB 로딩 중...</div>';
    await loadDB();
  }

  // 결재상태 로드
  let approvals = {};
  try {
    const res = await fetch(`${FB}/결재상태.json`);
    const d = await res.json();
    if (d) approvals = d;
  } catch(e) {}

  // 날짜 목록 추출 (중복 제거)
  const mode = document.getElementById('filter-mode').value;
  const month = document.getElementById('filter-month').value;
  const dateSet = new Set();
  allDB.forEach(r => {
    if (!r.날짜) return;
    if (r.날짜 < '2026-03-14') return;
    if (mode === 'month' && month && !r.날짜.startsWith(month)) return;
    dateSet.add(r.날짜);
  });

  let dates = Array.from(dateSet).sort((a,b) => b.localeCompare(a));

  if (CU.role === 'qc') {
    dates = dates.filter(d => approvals[d] && approvals[d].상태 === '결재완료');
  }

  if (dates.length === 0) {
    body.innerHTML = '<div class="empty">일보 데이터가 없습니다.<br><small>Excel 수불장에서 ERP 전송 버튼을 눌러주세요.</small></div>';
    return;
  }

  const wrap = document.createElement('div');
  wrap.className = 'ilbo-list';
  let lastMon = '';

  dates.forEach(d => {
    const ap = approvals[d] || {상태:'미결재'};
    const bMap = {'미결재':'badge-pending','결재중':'badge-waiting','결재완료':'badge-done','반려':'badge-rejected'};

    const mon = d.substring(0,7);
    if (mon !== lastMon) {
      if (lastMon !== '') {
        const div = document.createElement('div');
        div.className = 'month-divider';
        div.textContent = mon.replace('-','년 ')+'월';
        wrap.appendChild(div);
      }
      lastMon = mon;
    }

    const item = document.createElement('div');
    item.className = 'ilbo-item';
    item.innerHTML = `<div style="display:flex;align-items:center">
      <span class="ilbo-date">${d}</span>
      <span class="ilbo-dow">${dow(d)}</span>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <span class="badge ${bMap[ap.상태]||'badge-pending'}">${ap.상태}</span>
      <span style="color:var(--g4);font-size:12px">›</span>
    </div>`;
    item.onclick = () => openDetail(d, approvals[d]);
    wrap.appendChild(item);
  });

  body.innerHTML = '';
  body.appendChild(wrap);
}

function dow(ds) {
  return ['일','월','화','수','목','금','토'][new Date(ds).getDay()]+'요일';
}

// ── 작업구분 → 열 매핑 ──
const COL_MAP = {
  '기초재고':    'prev',
  '원료매입입고': 'in',
  '원료반입':    'in',
  '원료반출':    'use',
  '부재료매입':  'in',
  '부재료반출':  'use',
  '반제품생산':  'prod',
  '반제품반출':  'use',
  '반제품반입':  'in',
  '완제품생산':  'prod',
  '완제품출고':  'out',
  '재고조정':    'in',
};

const T1_TYPES = ['기초재고','원료매입입고','원료반입','원료반출','부재료매입','부재료반출','반제품반출','반제품반입','재고조정'];
const T2_TYPES = ['반제품생산','완제품생산'];
const T3_TYPES = ['완제품출고'];

// ── 품목코드 prefix → 품목 유형 ──
// R-xxx=원료, S-xxx=반제품, B-xxx/IB-xxx=부재료, P-xxx=완제품
function getItemType(r) {
  const code = (r.품목코드||'').toUpperCase();
  if (code.startsWith('P-')) return '완제품';
  if (code.startsWith('S-')) return '반제품';
  if (code.startsWith('B-') || code.startsWith('IB-')) return '부재료';
  if (code.startsWith('R-') || code.startsWith('IR-')) return '원료';
  // 코드 없으면 LOT prefix로 판단
  const lot = (r.LOT||'').toUpperCase();
  if (lot.startsWith('P')) return '완제품';
  if (lot.startsWith('S')) return '반제품';
  if (lot.startsWith('IB')) return '부재료';
  if (lot.startsWith('R') || lot.startsWith('IR')) return '원료';
  return r.작업구분||'';
}

// ── 전일재고 누적 계산 (해당 날짜 이전 전체 DB 합산) ──
function calcAllPrevStocks(dateStr) {
  const stockMap = new Map(); // key: 품목코드|LOT → 누적 재고
  allDB.forEach(r => {
    if (!r.날짜 || r.날짜 >= dateStr) return;
    const key = (r.품목코드||'') + '|' + (r.LOT||'');
    if (!stockMap.has(key)) stockMap.set(key, 0);
    const col = COL_MAP[r.작업구분] || 'in';
    const qty = Math.abs(parseFloat(r.수량)||0);
    if (col === 'prev' || col === 'in' || col === 'prod') {
      stockMap.set(key, stockMap.get(key) + qty);
    } else { // use, out
      stockMap.set(key, stockMap.get(key) - qty);
    }
  });
  return stockMap;
}

// ── 일보 상세 (DB 데이터로 구성) ──
function openDetail(dateStr, ap) {
  CD = dateStr;
  CA = ap || {상태:'미결재', 담당자결재:false, 대표결재:false};

  document.getElementById('ilbo-list-view').style.display = 'none';
  document.getElementById('ilbo-detail-view').style.display = 'block';
  document.getElementById('detail-title').textContent = `생산 및 물류일보 — ${dateStr} (${dow(dateStr)})`;
  document.getElementById('print-date').textContent = dateStr;

  renderApBar();
  renderActs();

  const rows = allDB.filter(r => r.날짜 === dateStr);

  // 전일재고 맵 계산 (날짜 이전 전체 DB 누적)
  const prevStockMap = calcAllPrevStocks(dateStr);

  const t1=[], t2=[], t3=[];
  rows.forEach(r => {
    const wt = r.작업구분 || '';
    if (T3_TYPES.includes(wt)) {
      t3.push(r);
    } else if (wt === '완제품생산') {
      // 완제품생산은 표2(생산내역)와 표3(출고내역) 양쪽에 포함
      // → 표3에서 생산+출고를 합산해 현재고를 올바르게 계산
      t2.push(r);
      t3.push(r);
    } else if (T1_TYPES.includes(wt)) {
      t1.push(r);
    } else if (T2_TYPES.includes(wt)) { // 반제품생산
      t2.push(r);
    }
  });

  renderTbl('tb1', aggregateRows(t1, prevStockMap));
  renderTbl('tb2', aggregateRows(t2, prevStockMap));
  renderTbl('tb3', aggregateRows(t3, prevStockMap));
}

// 품목코드+LOT 기준으로 행 합산
// prevStockMap: calcAllPrevStocks()가 반환한 전일재고 맵
function aggregateRows(rows, prevStockMap) {
  const map = new Map();
  rows.forEach(r => {
    const key = (r.품목코드||'') + '|' + (r.LOT||'');
    if (!map.has(key)) {
      // 전일재고: prevStockMap에서 가져오기 (없으면 0)
      const prevStock = prevStockMap ? (prevStockMap.get(key) || 0) : 0;
      map.set(key, {
        구분Set: new Set(),
        itemType: getItemType(r), // 품목 유형 (원료/반제품/부재료/완제품)
        품목코드: r.품목코드||'',
        품목명: r.품목명||'',
        LOT: r.LOT||'',
        규격: r.규격||'',
        비고: r.비고||'',
        prev: prevStock > 0 ? prevStock : 0,
        in:0, prod:0, use:0, out:0
      });
    }
    const row = map.get(key);
    if (r.작업구분) row.구분Set.add(r.작업구분);
    const col = COL_MAP[r.작업구분] || 'in';
    // 수불DB 수량: 입고/생산 양수, 출고/반출 음수 → 절댓값 처리
    const qty = Math.abs(parseFloat(r.수량)||0);
    // prev(기초재고)는 DB에 직접 있는 경우 반영 (prevStockMap 우선)
    if (col !== 'prev') row[col] += qty;
    if (r.비고 && !row.비고) row.비고 = r.비고;
  });
  return Array.from(map.values()).map(r => ({
    ...r,
    작업구분: r.itemType // 구분 열에 품목 유형 표시
  }));
}

function renderTbl(id, rows) {
  const tbody = document.getElementById(id);
  tbody.innerHTML = '';
  if (!rows || !rows.length) {
    tbody.innerHTML = '<tr><td colspan="12" style="text-align:center;padding:16px;color:var(--g4)">해당 내역 없음</td></tr>';
    return;
  }
  rows.forEach(r => {
    const isAgg = r.prev !== undefined;
    let prev='-', inV='-', prod='-', use='-', out='-', curr='-';

    if (isAgg) {
      prev = r.prev > 0 ? fmt(r.prev) : '-';
      inV  = r.in   > 0 ? fmt(r.in)   : '-';
      prod = r.prod > 0 ? fmt(r.prod)  : '-';
      use  = r.use  > 0 ? fmt(r.use)   : '-';
      out  = r.out  > 0 ? fmt(r.out)   : '-';
      const currVal = r.prev + r.in + r.prod - r.use - r.out;
      if (currVal < 0) {
        curr = `<span style="color:var(--red);font-weight:700">▼${fmt(Math.abs(currVal))}</span>`;
      } else if (currVal > 0) {
        curr = fmt(currVal);
      } else {
        curr = '-';
      }
    } else {
      const col = COL_MAP[r.작업구분] || 'prod';
      const qty = Math.abs(parseFloat(r.수량)||0);
      if (col === 'prod') prod = fmt(qty);
      else if (col === 'out') out = fmt(qty);
      else if (col === 'in') inV = fmt(qty);
      else if (col === 'use') use = fmt(qty);
    }

    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${r.작업구분||''}</td>
      <td>${r.품목코드||''}</td>
      <td class="tl">${r.품목명||''}</td>
      <td><span class="lot-link" onclick="openLotModal('${esc2(r.LOT||'')}')">${r.LOT||''}</span></td>
      <td>${r.규격||''}</td>
      <td class="tr">${prev}</td>
      <td class="tr">${inV}</td>
      <td class="tr">${prod}</td>
      <td class="tr">${use}</td>
      <td class="tr">${out}</td>
      <td class="tr">${curr}</td>
      <td class="tl">${r.비고||''}</td>`;
    tbody.appendChild(tr);
  });
}

function fmt(v) {
  if (v === undefined || v === null) return '-';
  const n = parseFloat(v);
  if (isNaN(n) || n === 0) return '-';
  return n.toLocaleString('ko-KR', {maximumFractionDigits:3});
}

function esc(s) { return String(s).replace(/'/g,"\'"); }
function esc2(s) { return String(s).replace(/'/g,"\'"); }

// ── 결재선 렌더 ──
function renderApBar() {
  const ap = CA;
  document.getElementById('ap1').className = 'ap-step ' + (ap.담당자결재 ? 'done' : 'waiting');
  document.getElementById('ap2').className = 'ap-step ' + (ap.대표결재 ? 'done' : ap.담당자결재 ? 'waiting' : 'pending');
  document.getElementById('ap1-st').innerHTML = ap.담당자결재
    ? '<span style="color:var(--teal)">✔ 상신완료</span>'
    : '<span style="color:var(--amber)">대기중</span>';
  document.getElementById('ap2-st').innerHTML = ap.대표결재
    ? '<span style="color:var(--teal)">✔ 승인완료</span>'
    : ap.상태==='반려' ? '<span style="color:var(--red)">✘ 반려</span>'
    : ap.담당자결재 ? '<span style="color:var(--amber)">승인 대기</span>'
    : '<span style="color:var(--g4)">-</span>';
}

function renderActs() {
  const div = document.getElementById('detail-acts');
  div.innerHTML = '';
  const role = CU.role, ap = CA;
  if (ap.상태==='결재완료' || role==='qc') {
    addBtn(div,'🖨️ 인쇄','btn-print',()=>window.print());
  }
  if (role==='admin' && (ap.상태==='미결재'||ap.상태==='반려')) {
    addBtn(div,'✅ 상신','btn-success',submitApproval);
  }
  if (role==='ceo' && ap.담당자결재 && !ap.대표결재) {
    addBtn(div,'✔ 승인','btn-success',approveCeo);
    addBtn(div,'✘ 반려','btn-danger',rejectCeo);
  }
  if (role==='ceo' && ap.상태==='결재완료') {
    addBtn(div,'🖨️ 인쇄','btn-print',()=>window.print());
  }
}

function addBtn(c,label,cls,fn) {
  const b=document.createElement('button');
  b.className='btn '+cls; b.innerHTML=label; b.onclick=fn; c.appendChild(b);
}

// ── 결재 처리 ──
async function submitApproval() {
  if (!confirm(`${CD} 일보를 결재 상신합니까?`)) return;
  await saveAp({담당자결재:true, 대표결재:false, 상태:'결재중'});
  alert('상신 완료! 대표님 승인을 기다립니다.');
}
async function approveCeo() {
  if (!confirm(`${CD} 일보를 최종 승인합니까?`)) return;
  await saveAp({담당자결재:true, 대표결재:true, 상태:'결재완료'});
  alert('승인 완료되었습니다.');
}
async function rejectCeo() {
  const r = prompt('반려 사유를 입력하세요:');
  if (r===null) return;
  await saveAp({담당자결재:false, 대표결재:false, 상태:'반려', 반려사유:r});
  alert('반려 처리되었습니다.');
}
async function saveAp(update) {
  CA = {...CA, ...update, 날짜:CD};
  await fetch(`${FB}/결재상태/${CD}.json`, {
    method:'PUT', headers:{'Content-Type':'application/json'},
    body: JSON.stringify(CA)
  });
  renderApBar(); renderActs();
}

function openLotModal(lot) {
  if (!lot) return;
  // 품목명 찾아서 타이틀에 표시
  const seed = allDB && allDB.find(r => r.LOT && r.LOT.toUpperCase() === lot.toUpperCase());
  const titleSuffix = seed ? ` · ${seed.품목명||''}` : '';
  document.getElementById('modal-title').textContent = `🔍 ${lot}${titleSuffix}`;
  document.getElementById('modal-body').innerHTML = '<div class="loading"><div class="spinner"></div><br>추적 중...</div>';
  document.getElementById('lot-modal').style.display = 'flex';
  renderLotResult(lot, 'modal-body');
}

function closeLotModal() {
  document.getElementById('lot-modal').style.display = 'none';
}

// LOT 추적 페이지에서도 사용
function searchLot(lot) {
  const div = document.getElementById('lot-result');
  if (!lot) { div.innerHTML=''; return; }
  div.innerHTML = '<div class="loading"><div class="spinner"></div><br>추적 중...</div>';
  renderLotResult(lot, 'lot-result');

// ── LOT/품목 역추적 ──
// lot: LOT번호 또는 품목명으로 검색
// targetId: 결과를 렌더링할 요소 ID
function renderLotResult(lot, targetId) {
  const div = document.getElementById(targetId);
  if (!allDB || allDB.length === 0) {
    div.innerHTML = '<div class="empty">수불DB 데이터가 없습니다.</div>';
    return;
  }

  const lotUpper = lot.toUpperCase();

  // 1. 해당 LOT와 정확히 일치하는 행 우선 찾기
  let seedRows = allDB.filter(r => r.LOT && r.LOT.toUpperCase() === lotUpper);
  // 없으면 포함 검색 fallback
  if (seedRows.length === 0)
    seedRows = allDB.filter(r => r.LOT && r.LOT.toUpperCase().includes(lotUpper));
  if (seedRows.length === 0) {
    div.innerHTML = `<div class="empty">LOT <b>${lot}</b>에 해당하는 데이터가 없습니다.</div>`;
    return;
  }

  // 2. 품목 기본 정보
  const seed = seedRows[0];
  const itemName = seed.품목명 || '';
  const itemCode = seed.품목코드 || '';
  const iType = getItemType(seed);

  // 3. 해당 품목명 전체 이력
  const itemRows = allDB.filter(r => r.품목명 === itemName);
  itemRows.sort((a, b) => a.날짜.localeCompare(b.날짜));

  // 4. 이력 요약
  const sumMap = {생산:0, 투입:0, 출고:0, 입고:0};
  itemRows.forEach(r => {
    const qty = Math.abs(parseFloat(r.수량)||0);
    const col = COL_MAP[r.작업구분] || 'in';
    if (col === 'prod') sumMap.생산 += qty;
    else if (col === 'use') sumMap.투입 += qty;
    else if (col === 'out') sumMap.출고 += qty;
    else if (col === 'in') sumMap.입고 += qty;
  });

  // 5. 이 품목이 생산된 날짜들
  const prodDates = [...new Set(
    itemRows
      .filter(r => r.작업구분 === '완제품생산' || r.작업구분 === '반제품생산')
      .map(r => r.날짜)
  )].sort();

  // ── 헤더 ──
  const typeColor = {'완제품':'var(--teal)','반제품':'var(--blue)','원료':'var(--amber)','부재료':'var(--g5)'};
  const tc = typeColor[iType] || 'var(--navy)';
  let html = `
  <div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:14px">
    <div>
      <div style="font-size:16px;font-weight:700;color:var(--navy)">${itemName}</div>
      <div style="font-size:12px;color:var(--g4);margin-top:3px">
        품목코드: <b>${itemCode}</b> &nbsp;|&nbsp;
        LOT: <b>${lot}</b> &nbsp;|&nbsp;
        <span style="color:${tc};font-weight:700">${iType}</span>
      </div>
    </div>
  </div>
  <div class="lot-summary">
    <div class="lot-sum-item sum-입고">입고 ${sumMap.입고.toLocaleString()}</div>
    <div class="lot-sum-item sum-생산">생산 ${sumMap.생산.toLocaleString()}</div>
    <div class="lot-sum-item sum-투입">투입 ${sumMap.투입.toLocaleString()}</div>
    <div class="lot-sum-item sum-출고">출고 ${sumMap.출고.toLocaleString()}</div>
  </div>`;

  // ── 품목 이력 타임라인 ──
  html += `<div style="font-size:13px;font-weight:700;color:var(--navy);margin:18px 0 8px">
    📋 품목 전체 이력 <span style="font-size:11px;font-weight:400;color:var(--g4)">(${itemName} 기준 · ${itemRows.length}건)</span>
  </div>
  <div class="timeline">`;

  // 날짜+LOT+작업구분 단위로 묶어서 표시
  const tlMap = new Map();
  itemRows.forEach(r => {
    const k = r.날짜 + '§' + (r.LOT||'') + '§' + (r.작업구분||'');
    if (!tlMap.has(k)) tlMap.set(k, { ...r, qty:0 });
    tlMap.get(k).qty += Math.abs(parseFloat(r.수량)||0);
  });

  const tlType = (wt) => {
    if (!wt) return '기타';
    if (wt.includes('생산')) return '생산';
    if (wt.includes('출고')) return '출고';
    if (wt.includes('반출') || wt.includes('투입')) return '투입';
    return '입고';
  };

  Array.from(tlMap.values()).forEach(r => {
    const t = tlType(r.작업구분);
    const isCurrentLot = (r.LOT||'').toUpperCase() === lotUpper;
    html += `<div class="tl-node t${t}" style="${isCurrentLot ? 'border-color:var(--blue);background:var(--blue-lt)' : ''}">
      <div class="tl-top">
        <span class="tl-type">${r.작업구분||''}</span>
        <span class="tl-date">${r.날짜}</span>
        ${isCurrentLot ? '<span style="font-size:10px;background:var(--blue);color:#fff;padding:1px 6px;border-radius:3px;margin-left:4px">현재 LOT</span>' : ''}
      </div>
      <div class="tl-main">
        <span class="lot-link" onclick="openLotModal('${esc2(r.LOT||'')}')">${r.LOT||''}</span>
      </div>
      <div class="tl-detail">
        수량: <b>${r.qty.toLocaleString('ko-KR',{maximumFractionDigits:3})}</b> ${r.단위||''}
        ${r.비고 ? '&nbsp;|&nbsp;' + r.비고 : ''}
      </div>
    </div>`;
  });
  html += '</div>';

  // ── 생산일별 연관 투입 자재 (역추적) ──
  if (prodDates.length > 0) {
    html += `<div style="font-size:13px;font-weight:700;color:var(--navy);margin:20px 0 8px">
      🔗 생산일 투입 자재 역추적
      <span style="font-size:11px;font-weight:400;color:var(--g4)">(생산 당일 반출된 원료·반제품·부재료)</span>
    </div>`;

    prodDates.forEach(date => {
      const useRows = allDB.filter(r =>
        r.날짜 === date &&
        ['원료반출','반제품반출','부재료반출'].includes(r.작업구분)
      );
      if (useRows.length === 0) return;

      // LOT+품목 단위 집계
      const uMap = new Map();
      useRows.forEach(r => {
        const k = (r.품목코드||'') + '|' + (r.LOT||'');
        if (!uMap.has(k)) uMap.set(k, { ...r, qty:0 });
        uMap.get(k).qty += Math.abs(parseFloat(r.수량)||0);
      });

      // 구분별 정렬: 반제품 → 원료 → 부재료
      const sortOrder = {'반제품반출':0,'원료반출':1,'부재료반출':2};
      const sorted = Array.from(uMap.values()).sort((a,b) =>
        (sortOrder[a.작업구분]||9) - (sortOrder[b.작업구분]||9)
      );

      html += `<div style="border:1.5px solid var(--g2);border-radius:var(--r);margin-bottom:10px;overflow:hidden">
        <div style="background:var(--navy);color:#fff;padding:7px 14px;font-size:12px;font-weight:700">
          📅 ${date} (${dow(date)}) — 투입 자재 ${sorted.length}종
        </div>
        <table style="width:100%;font-size:12px;border-collapse:collapse">
          <thead><tr style="background:var(--g1)">
            <th style="padding:6px 10px;text-align:center;font-weight:600;color:var(--g5)">구분</th>
            <th style="padding:6px 10px;text-align:left;font-weight:600;color:var(--g5)">품목명</th>
            <th style="padding:6px 10px;text-align:left;font-weight:600;color:var(--g5)">LOT</th>
            <th style="padding:6px 10px;text-align:right;font-weight:600;color:var(--g5)">투입량</th>
            <th style="padding:6px 10px;text-align:center;font-weight:600;color:var(--g5)">단위</th>
          </tr></thead>
          <tbody>`;

      sorted.forEach((r, i) => {
        const lbl = r.작업구분 === '원료반출' ? '원료'
                  : r.작업구분 === '반제품반출' ? '반제품' : '부재료';
        const lc  = r.작업구분 === '원료반출' ? 'var(--amber)'
                  : r.작업구분 === '반제품반출' ? 'var(--blue)' : 'var(--g5)';
        const bg = i % 2 === 1 ? 'background:var(--g1)' : '';
        html += `<tr style="${bg};border-top:1px solid var(--g2)">
          <td style="padding:6px 10px;text-align:center">
            <span style="color:${lc};font-weight:700;font-size:11px">${lbl}</span>
          </td>
          <td style="padding:6px 10px">${r.품목명||''}</td>
          <td style="padding:6px 10px">
            <span class="lot-link" onclick="openLotModal('${esc2(r.LOT||'')}')">${r.LOT||''}</span>
          </td>
          <td style="padding:6px 10px;text-align:right;font-weight:600">
            ${r.qty.toLocaleString('ko-KR',{maximumFractionDigits:3})}
          </td>
          <td style="padding:6px 10px;text-align:center;color:var(--g4)">${r.단위||''}</td>
        </tr>`;
      });

      html += `</tbody></table></div>`;
    });
  }

  div.innerHTML = html;
}

// 키보드 ESC로 모달 닫기
document.addEventListener('keydown', e => { if (e.key==='Escape') closeLotModal(); });
</script>
</body>
</html>
