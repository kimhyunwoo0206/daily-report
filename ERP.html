<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>㈜위드프레쉬 생산일보 ERP</title>
<style>
:root{
  --navy:#0d2137;--navy2:#1a3a5c;--blue:#1e6fb5;--blue-lt:#e8f2fb;
  --teal:#0d8a72;--teal-lt:#e4f5f1;--amber:#d4820a;--amber-lt:#fef3e0;
  --red:#c0392b;--red-lt:#fdecea;
  --g1:#f7f8fa;--g2:#eef0f3;--g3:#d0d4db;--g4:#8c95a3;--g5:#3d4551;
  --text:#1a2130;--r:8px;--sh:0 2px 8px rgba(0,0,0,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:var(--g1);color:var(--text);font-size:14px;line-height:1.6}
/* 로그인 */
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--navy),var(--navy2))}
.login-box{background:#fff;border-radius:16px;padding:48px 40px;width:360px;box-shadow:0 4px 20px rgba(0,0,0,.15)}
.login-logo{text-align:center;margin-bottom:32px}
.login-logo .co{font-size:12px;color:var(--g4)}
.login-logo .title{font-size:20px;font-weight:700;color:var(--navy);margin-top:4px}
.login-logo .sub{font-size:11px;color:var(--teal);margin-top:2px;font-weight:600;letter-spacing:.08em}
.fg{margin-bottom:16px}
.fg label{display:block;font-size:12px;font-weight:600;color:var(--g5);margin-bottom:6px}
.fg input{width:100%;padding:10px 14px;border:1.5px solid var(--g3);border-radius:var(--r);font-size:14px;outline:none;transition:border-color .2s}
.fg input:focus{border-color:var(--blue)}
.btn-login{width:100%;padding:12px;background:var(--navy);color:#fff;border:none;border-radius:var(--r);font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn-login:hover{background:var(--navy2)}
.login-err{color:var(--red);font-size:12px;text-align:center;margin-top:10px;min-height:18px}
/* 앱 */
#app{display:none;min-height:100vh;flex-direction:column}
.topbar{background:var(--navy);color:#fff;padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.topbar-logo{font-size:16px;font-weight:700}
.topbar-logo span{color:#64b5f6}
.nav-btn{padding:6px 14px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-weight:500;color:rgba(255,255,255,.7);background:transparent;transition:all .15s;margin-left:4px}
.nav-btn:hover{background:rgba(255,255,255,.1);color:#fff}
.nav-btn.active{background:var(--blue);color:#fff}
.user-badge{font-size:12px;color:rgba(255,255,255,.7);background:rgba(255,255,255,.1);padding:4px 10px;border-radius:20px}
.btn-logout{font-size:12px;color:rgba(255,255,255,.6);background:transparent;border:1px solid rgba(255,255,255,.2);padding:4px 10px;border-radius:6px;cursor:pointer;margin-left:8px}
.btn-logout:hover{color:#fff}
/* 메인 */
.main{flex:1;padding:24px;max-width:1380px;margin:0 auto;width:100%}
.page{display:none}.page.active{display:block}
/* 카드 */
.card{background:#fff;border-radius:var(--r);box-shadow:var(--sh);margin-bottom:16px}
.card-hd{padding:14px 20px;border-bottom:1px solid var(--g2);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.card-title{font-size:15px;font-weight:700;color:var(--navy)}
.card-body{padding:20px}
/* 버튼 */
.btn{padding:7px 14px;border-radius:var(--r);border:none;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:5px}
.btn-primary{background:var(--blue);color:#fff}.btn-primary:hover{background:#1558a0}
.btn-success{background:var(--teal);color:#fff}.btn-success:hover{background:#0a7060}
.btn-danger{background:var(--red);color:#fff}.btn-danger:hover{background:#a93226}
.btn-outline{background:#fff;color:var(--navy);border:1.5px solid var(--g3)}.btn-outline:hover{border-color:var(--blue);color:var(--blue)}
.btn-print{background:var(--g5);color:#fff}.btn-print:hover{background:var(--navy)}
.btn-sm{padding:4px 10px;font-size:12px}
/* 배지 */
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.badge-pending{background:var(--g2);color:var(--g5)}
.badge-waiting{background:var(--amber-lt);color:var(--amber)}
.badge-done{background:var(--teal-lt);color:var(--teal)}
.badge-rejected{background:var(--red-lt);color:var(--red)}
/* 필터 */
.filter-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.filter-row input,.filter-row select{padding:7px 12px;border:1.5px solid var(--g3);border-radius:var(--r);font-size:13px;outline:none}
.filter-row input:focus,.filter-row select:focus{border-color:var(--blue)}
/* 일보 목록 */
.ilbo-list{display:flex;flex-direction:column;gap:6px}
.ilbo-item{border:1.5px solid var(--g2);border-radius:var(--r);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:all .15s;background:#fff}
.ilbo-item:hover{border-color:var(--blue);box-shadow:var(--sh)}
.ilbo-date{font-size:15px;font-weight:700;color:var(--navy)}
.ilbo-dow{font-size:12px;color:var(--g4);margin-left:10px}
.month-div{padding:10px 4px 4px;font-size:12px;font-weight:700;color:var(--g4);border-top:1px solid var(--g2);margin-top:4px}
/* 결재선 */
.ap-bar{display:flex;border:1.5px solid var(--g3);border-radius:var(--r);overflow:hidden;margin-bottom:16px}
.ap-step{flex:1;padding:12px 16px;text-align:center;border-right:1px solid var(--g3)}
.ap-step:last-child{border-right:none}
.ap-step .role{font-size:11px;color:var(--g4);margin-bottom:3px}
.ap-step .name{font-size:13px;font-weight:700;color:var(--navy)}
.ap-step .status{font-size:11px;margin-top:3px}
.ap-step.done{background:var(--teal-lt)}
.ap-step.waiting{background:var(--amber-lt)}
.ap-step.pending{background:var(--g1)}
/* 테이블 */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{background:var(--navy);color:#fff;padding:8px 8px;text-align:center;font-weight:600;white-space:nowrap}
tbody tr:nth-child(even){background:var(--g1)}
tbody tr:hover{background:var(--blue-lt)}
tbody td{padding:6px 8px;border-bottom:1px solid var(--g2);text-align:center;white-space:nowrap}
tbody td.tl{text-align:left}
tbody td.tr{text-align:right}
.lot-btn{color:var(--blue);font-weight:700;cursor:pointer;font-size:11px;background:var(--blue-lt);padding:2px 7px;border-radius:4px;border:none;white-space:nowrap;font-family:inherit}
.lot-btn:hover{background:var(--blue);color:#fff}
.gbn-tag{display:inline-block;padding:1px 6px;border-radius:3px;font-size:10px;font-weight:700}
.gbn-완제품{background:#d4edda;color:#155724}
.gbn-반제품{background:#d1ecf1;color:#0c5460}
.gbn-원료{background:#fff3cd;color:#856404}
.gbn-부재료{background:#e8d5f5;color:#6d3dab}
/* 로딩/빈값 */
.loading{text-align:center;padding:40px;color:var(--g4)}
.spinner{display:inline-block;width:22px;height:22px;border:3px solid var(--g3);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:10px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:32px;color:var(--g4)}
/* 상세 헤더 */
.detail-hd{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px}
.detail-title{font-size:17px;font-weight:700;color:var(--navy);margin-top:6px}
/* 인쇄 */
@media print{
  .topbar,.filter-row,.btn,.ap-bar,.detail-acts,.no-print{display:none!important}
  .card{box-shadow:none;border:1px solid #ccc}
  .print-hd{display:block!important}
  body{background:#fff}
  thead th{background:#2c3e50!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
}
.print-hd{display:none;text-align:center;margin-bottom:16px}
.print-hd h2{font-size:18px;font-weight:700}
</style>
</head>
<body>
<!-- 로그인 -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <div class="co">㈜위드프레쉬</div>
      <div class="title">생산일보 ERP</div>

    </div>
    <div class="fg"><label>아이디</label><input type="text" id="uid" placeholder="아이디" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <div class="fg"><label>비밀번호</label><input type="password" id="upw" placeholder="비밀번호" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <button class="btn-login" onclick="doLogin()">로그인</button>

    <div style="display:flex;align-items:center">
      <span class="user-badge" id="user-badge"></span>
      <button class="btn-logout" onclick="doLogout()">로그아웃</button>
    </div>
  </div>
  <div class="main">
    <!-- 일보 페이지 -->
    <div class="page active" id="ilbo-page">
      <div id="list-view">
        <div class="card">
          <div class="card-hd">
            <span class="card-title">📋 일보 목록</span>

                <option value="all">전체 기간</option>
                <option value="month">월별 조회</option>

              <button class="btn btn-outline" onclick="loadList()">조회</button>
            </div>
          </div>
          <div class="card-body"><div id="list-body"><div class="loading"><div class="spinner"></div><br>수불DB 로딩 중...</div></div></div>
        </div>
      </div>
      <div id="detail-view" style="display:none">
        <div class="detail-hd">
          <div>
            <button class="btn btn-outline btn-sm no-print" onclick="showList()">← 목록</button>
            <div class="detail-title" id="detail-title"></div>
          </div>
          <div class="detail-acts no-print" id="detail-acts"></div>
        </div>
        <div class="ap-bar no-print">
          <div class="ap-step" id="ap1"><div class="role">작성자</div><div class="name">김현우 공장장</div><div class="status" id="ap1-st">-</div></div>
          <div class="ap-step" id="ap2"><div class="role">대표이사</div><div class="name">전경진 대표</div><div class="status" id="ap2-st">-</div></div>
        </div>
        <div class="print-hd"><h2>생산 및 물류일보</h2><p id="print-date"></p><p>㈜위드프레쉬</p></div>
        <div class="card">
          <div class="card-hd"><span class="card-title">표 1. 원료·부재료·반제품 수불내역</span></div>
          <div class="card-body"><div class="tbl-wrap" id="tb1"></div></div>
        </div>
        <div class="card">
          <div class="card-hd"><span class="card-title">표 2. 반제품·완제품 생산내역</span></div>
          <div class="card-body"><div class="tbl-wrap" id="tb2"></div></div>
        </div>
        <div class="card">
          <div class="card-hd"><span class="card-title">표 3. 완제품 출고내역</span></div>
          <div class="card-body"><div class="tbl-wrap" id="tb3"></div></div>
        </div>
      </div>
    </div>
    <!-- LOT 조회 페이지 -->
    <div class="page" id="lot-page">
      <div class="card">
        <div class="card-hd"><span class="card-title">🔍 LOT 직접 조회</span></div>
        <div class="card-body">
          <div class="filter-row" style="margin-bottom:16px">
            <input type="text" id="lot-inp" placeholder="LOT번호 입력 (예: P260603)" style="width:280px" onkeydown="if(event.key==='Enter')searchLot()">
            <button class="btn btn-primary" onclick="searchLot()">조회</button>
          </div>
          <div id="lot-result"></div>
        </div>
      </div>
    </div>
  </div>
</div>

function doLogin(){

  const u=USERS[id];

async function loadDB(){
  DB=[];
  try{
    const idx=await fetch(FB+'/수불DB.json?shallow=true').then(r=>r.json());
    if(!idx)return;
    const keys=Object.keys(idx).sort((a,b)=>(parseInt(a.replace(/\D/g,''))||0)-(parseInt(b.replace(/\D/g,''))||0));
    const res=await Promise.all(keys.map(k=>fetch(FB+'/수불DB/'+k+'.json').then(r=>r.json()).catch(()=>null)));
    res.forEach(b=>{if(b)Object.values(b).forEach(r=>{if(r&&r.날짜)DB.push(r);})});
    console.log('DB:',DB.length,'건');
  }catch(e){console.error(e);DB=[];}
}

// ── 일보 목록 ──
async function loadList(){
  const body=document.getElementById('list-body');
  if(!DB||!DB.length){body.innerHTML='<div class="loading"><div class="spinner"></div><br>로딩 중...</div>';await loadDB();}
  let ap={};
  try{const r=await fetch(FB+'/결재상태.json').then(r=>r.json());if(r)ap=r;}catch(e){}
  const mode=document.getElementById('f-mode').value;
  const month=document.getElementById('f-month').value;
  const ds=new Set();
  DB.forEach(r=>{if(!r.날짜||r.날짜<'2026-03-01')return;if(mode==='month'&&month&&!r.날짜.startsWith(month))return;ds.add(r.날짜);});
  let dates=[...ds].sort((a,b)=>b.localeCompare(a));
  if(CU.role==='qc')dates=dates.filter(d=>ap[d]&&ap[d].상태==='결재완료');
  if(!dates.length){body.innerHTML='<div class="empty">데이터 없음</div>';return;}
  const bm={'미결재':'badge-pending','결재중':'badge-waiting','결재완료':'badge-done','반려':'badge-rejected'};
  const wrap=document.createElement('div');wrap.className='ilbo-list';
  let lastM='';
  dates.forEach(d=>{
    const a=ap[d]||{상태:'미결재'};
    const m=d.slice(0,7);
    if(m!==lastM){if(lastM){const dv=document.createElement('div');dv.className='month-div';dv.textContent=m.replace('-','년 ')+'월';wrap.appendChild(dv);}lastM=m;}
    const el=document.createElement('div');el.className='ilbo-item';
    el.innerHTML='<div style="display:flex;align-items:center"><span class="ilbo-date">'+d+'</span><span class="ilbo-dow">'+dow(d)+'</span></div>'
      +'<div style="display:flex;align-items:center;gap:10px"><span class="badge '+(bm[a.상태]||'badge-pending')+'">'+a.상태+'</span><span style="color:var(--g4)">›</span></div>';
    el.onclick=()=>openDetail(d,ap[d]);
    wrap.appendChild(el);
  });
  body.innerHTML='';body.appendChild(wrap);
}
function dow(d){return['일','월','화','수','목','금','토'][new Date(d).getDay()]+'요일';}

// ── 일보 상세 ──
function openDetail(dateStr,ap){
  CD=dateStr;CA=ap||{상태:'미결재',담당자결재:false,대표결재:false};
  document.getElementById('list-view').style.display='none';
  document.getElementById('detail-view').style.display='block';
  document.getElementById('detail-title').textContent='생산 및 물류일보 — '+dateStr+' ('+dow(dateStr)+')';
  document.getElementById('print-date').textContent=dateStr;
  renderAp();renderActs();
  const rows=DB.filter(r=>r.날짜===dateStr);
  renderT('tb1',agg(rows.filter(r=>T1.has(r.작업구분||''))));
  renderT('tb2',agg(rows.filter(r=>T2.has(r.작업구분||''))));
  renderT('tb3',agg(rows.filter(r=>T3.has(r.작업구분||''))));
}

function getV(r,f){
  if(f==='nm') return r.품목명||r.검색어||'';
  if(f==='lot') return r.LOT||r['LOT번호']||'';
  if(f==='unit') return r.규격||r.단위||'';
  if(f==='co') return r.거래처작업자||r['거래처/작업자']||r.거래처||'';
  return (r[f]!==undefined&&r[f]!==null)?String(r[f]):'';
}

function agg(rows){
  const m=new Map();
  rows.forEach(r=>{
    const lot=getV(r,'lot');
    const key=(r.품목코드||'')+'|'+lot;
    if(!m.has(key))m.set(key,{wt:r.작업구분||'',cd:r.품목코드||'',nm:getV(r,'nm'),lot,unit:getV(r,'unit'),co:getV(r,'co'),note:r.비고||'',prev:0,in:0,prod:0,use:0,out:0});
    const row=m.get(key);
    const col=COL[r.작업구분]||'in';
    row[col]+=Math.abs(parseFloat(r.수량)||0);
    if(!row.note)row.note=r.비고||'';
  });
  return [...m.values()];
}

function gbn(cd){
  cd=String(cd||'').toUpperCase();
  if(cd.startsWith('P'))return '완제품';
  if(cd.startsWith('S'))return '반제품';
  if(cd.startsWith('IB'))return '부재료';
  if(cd.startsWith('R'))return '원료';
  return '원료';
}

function n(v){if(!v||v===0)return '-';const f=parseFloat(v);return isNaN(f)||f===0?'-':f.toLocaleString('ko-KR',{maximumFractionDigits:3});}

function renderT(id,rows){
  const w=document.getElementById(id);
  if(!rows||!rows.length){w.innerHTML='<p style="color:var(--g4);padding:8px;font-size:12px">해당 내역 없음</p>';return;}
  const hasco=rows.some(r=>r.co);
  let h='<table><thead><tr><th>구분</th><th>코드</th><th style="min-width:130px;text-align:left">품목명</th><th>LOT번호</th><th>규격</th><th>전일</th><th>입고</th><th>생산</th><th>투입</th><th>출고</th><th>현재고</th>'+(hasco?'<th>거래처</th>':'')+'<th>비고</th></tr></thead><tbody>';
  rows.forEach(r=>{
    const g=gbn(r.cd);
    const curr=(r.prev||0)+(r.in||0)+(r.prod||0)-(r.use||0)-(r.out||0);
    const lot=r.lot||'';
    const lotCell=lot?'<button class="lot-btn" onclick="openLot('+JSON.stringify(lot)+','+JSON.stringify(r.nm)+','+JSON.stringify(r.cd)+')">'+lot+'</button>':'<span style="color:var(--g3)">-</span>';
    h+='<tr>'
      +'<td><span class="gbn-tag gbn-'+g+'">'+g+'</span></td>'
      +'<td style="font-size:10px">'+r.cd+'</td>'
      +'<td class="tl">'+r.nm+'</td>'
      +'<td style="padding:4px 6px">'+lotCell+'</td>'
      +'<td>'+r.unit+'</td>'
      +'<td class="tr">'+n(r.prev)+'</td>'
      +'<td class="tr">'+n(r.in)+'</td>'
      +'<td class="tr">'+n(r.prod)+'</td>'
      +'<td class="tr">'+n(r.use)+'</td>'
      +'<td class="tr">'+n(r.out)+'</td>'
      +'<td class="tr" style="font-weight:600;color:'+(curr<0?'var(--red)':'inherit')+'">'+n(curr)+'</td>'
      +(hasco?'<td>'+r.co+'</td>':'')
      +'<td class="tl" style="color:var(--g5)">'+r.note+'</td>'
      +'</tr>';
  });
  w.innerHTML=h+'</tbody></table>';
}

// ═══════════════════════════════════════
//  LOT 팝업 — 해당 LOT만 표시 + BOM 구성 재료
// ═══════════════════════════════════════
function openLot(lot, nm, cd){
  if(!lot||!DB)return;

  // ① 이 LOT와 정확히 일치하는 기록만
  const recs=DB.filter(r=>(r.LOT||r['LOT번호']||'')=== lot);

  // 품목명/코드 보정
  if(!nm&&recs.length>0)nm=getV(recs[0],'nm');
  if(!cd&&recs.length>0)cd=recs[0].품목코드||'';

  const prefix=lot.replace(/[0-9]/g,'').slice(0,2).toUpperCase().replace(/[^A-Z]/g,'');
  const pmap={IR:'초기재고',IB:'부재료',P:'완제품',S:'반제품',R:'원료'};
  const typeNm=pmap[prefix]||pmap[lot[0]]||'기타';
  const tclr={IR:'#6d3dab',IB:'#6d3dab',P:'#0d8a72',S:'#0c5460',R:'#856404'}[prefix]||{IR:'#6d3dab',IB:'#6d3dab',P:'#0d8a72',S:'#0c5460',R:'#856404'}[lot[0].toUpperCase()]||'#3d4551';

  // ② BOM 구성 재료 (완제품/반제품 → 이 제품이 만들어지는 재료)
  const bomMats=BOM_DATA[cd]||[];

  // ③ BOM 역방향 (원료/부재료 → 이 재료가 들어가는 완제품 코드)
  const fgList=MAT_TO_FG[nm]||[];

  // ④ 수량 요약
  let si=0,sp=0,su=0,so=0;
  recs.forEach(r=>{
    const q=Math.abs(parseFloat(r.수량)||0);
    const c=COL[r.작업구분]||'';
    if(c==='in'||c==='prev')si+=q;
    else if(c==='prod')sp+=q;
    else if(c==='use')su+=q;
    else if(c==='out')so+=q;
  });

  // ── HTML 생성 ──
  function mkTbl(rows,fields,hdrs){
    if(!rows||!rows.length)return '<p style="color:#999;font-size:12px;padding:6px 0">해당 내역 없음</p>';
    let h='<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12px"><thead><tr>';
    hdrs.forEach(hd=>h+='<th style="background:#2c3e50;color:#fff;padding:6px 8px;white-space:nowrap;text-align:center">'+hd+'</th>');
    h+='</tr></thead><tbody>';
    rows.forEach((r,i)=>{
      h+='<tr style="background:'+(i%2===0?'#f9f9f9':'#fff')+'">';
      fields.forEach(f=>{
        const v=getV(r,f)||r[f]||'';
        const isLot=(f==='lot'||f==='LOT'||f==='LOT번호');
        const lv=getV(r,'lot');
        const align=(f==='수량'||f==='금액')?'right':'left';
        if(isLot){
          h+='<td style="padding:5px 8px;border-bottom:1px solid #eee;text-align:center">'+(lv?'<span style="background:#e8f2fb;color:#1e6fb5;padding:2px 6px;border-radius:3px;font-size:11px;font-weight:600">'+lv+'</span>':'-')+'</td>';
        }else{
          h+='<td style="padding:5px 8px;border-bottom:1px solid #eee;text-align:'+align+'">'+v+'</td>';
        }
      });
      h+='</tr>';
    });
    return h+'</tbody></table></div>';
  }

  function mkBom(mats){
    if(!mats||!mats.length)return '<p style="color:#999;font-size:12px;padding:6px 0">등록된 BOM 없음 (BOM편집기에서 등록하세요)</p>';
    const cmap={반제품:'#0c5460',원료:'#856404',부재료:'#6d3dab',부자재:'#155724'};
    const bmap={반제품:'#d1ecf1',원료:'#fff3cd',부재료:'#e8d5f5',부자재:'#d4edda'};
    let h='<table style="width:100%;border-collapse:collapse;font-size:12px"><thead><tr>'
      +'<th style="background:#2c3e50;color:#fff;padding:6px 8px;text-align:center">구분</th>'
      +'<th style="background:#2c3e50;color:#fff;padding:6px 8px">재료명</th>'
      +'</tr></thead><tbody>';
    mats.forEach((m,i)=>{
      const clr=cmap[m.gbn]||'#333';
      const bg=bmap[m.gbn]||'#eee';
      h+='<tr style="background:'+(i%2===0?'#f9f9f9':'#fff')+'">'
        +'<td style="padding:5px 8px;border-bottom:1px solid #eee;text-align:center"><span style="background:'+bg+';color:'+clr+';padding:2px 8px;border-radius:3px;font-size:11px;font-weight:700">'+m.gbn+'</span></td>'
        +'<td style="padding:5px 8px;border-bottom:1px solid #eee;font-weight:500">'+m.name+'</td>'
        +'</tr>';
    });
    return h+'</tbody></table>';
  }

  const F=['날짜','작업구분','nm','lot','수량','unit','co','비고'];
  const H=['일자','작업구분','품목명','LOT번호','수량','단위','거래처/작업자','비고'];
  const qf=v=>v>0?v.toLocaleString('ko-KR',{maximumFractionDigits:3}):'-';
  const fgBadges=fgList.map(c=>'<span style="background:#e8f2fb;color:#1e6fb5;padding:3px 10px;border-radius:4px;font-size:12px;font-weight:600">'+c+'</span>').join(' ');
  const now=new Date().toLocaleString('ko-KR');

  let body='<div style="padding:20px;max-width:760px;margin:0 auto">';

  // 기본 정보 카드
  body+='<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px">'
    +ic('LOT 번호',lot,'#0d2137')
    +ic('유형',typeNm,tclr)
    +ic('품목명',nm,'#0d2137')
    +ic('품목코드',cd,'#0d2137')
    +'</div>';

  // 수량 요약
  body+='<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px">'
    +ic('입고/기초',qf(si),'#1e6fb5')
    +ic('생산',qf(sp),'#0d8a72')
    +ic('투입',qf(su),'#d4820a')
    +ic('출고',qf(so),'#c0392b')
    +'</div>';

  // ① 이 LOT 이력
  body+=sec('📋 이 LOT 이력 ('+recs.length+'건)',mkTbl(recs,F,H));

  // ② BOM 구성 재료 (완제품/반제품인 경우)
  if(lot[0].toUpperCase()==='P'||lot.toUpperCase().startsWith('S')){
    body+=sec('📐 BOM 구성 재료 ('+bomMats.length+'종) — 이 제품 제조에 필요한 반제품·원료·부재료',mkBom(bomMats));
  }

  // ③ BOM 역방향 (원료/부재료인 경우)
  if((lot[0].toUpperCase()==='R'||lot.toUpperCase().startsWith('IB'))&&fgList.length>0){
    body+=sec('🔗 이 재료가 들어가는 완제품 (BOM 기준, '+fgList.length+'개)','<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:4px">'+fgBadges+'</div>');
  }

  body+='<div style="text-align:center;color:#8c95a3;font-size:11px;margin-top:20px;padding-top:16px;border-top:1px solid #eee">㈜위드프레쉬 생산일보 ERP | 출력일시: '+now+'</div>';
  body+='</div>';

  const popup=window.open('','lot_'+lot,'width=820,height=700,scrollbars=yes,resizable=yes');
  if(!popup){alert('팝업 차단을 해제해 주세요.');return;}
  popup.document.open();
  popup.document.write('<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><title>LOT: '+lot+'</title>'
    +'<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:"Apple SD Gothic Neo","Noto Sans KR",sans-serif;background:#f5f5f5;color:#1a2130;font-size:14px}'
    +'.ph{background:#0d2137;color:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0}'
    +'.ph h1{font-size:15px;font-weight:700}.lb{background:#1e6fb5;padding:4px 12px;border-radius:4px;font-size:13px;font-weight:700}'
    +'.bp{background:#3d4551;color:#fff;border:none;padding:7px 18px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer}'
    +'.bp:hover{background:#0d2137}'
    +'@media print{.ph .bp{display:none}body{background:#fff}}'
    +'</style></head><body>'
    +'<div class="ph"><div><div style="font-size:10px;color:rgba(255,255,255,.5);margin-bottom:2px">㈜위드프레쉬 LOT 추적</div><h1>'+nm+' <span class="lb">'+lot+'</span></h1></div>'
    +'<button class="bp" onclick="window.print()">🖨️ 인쇄</button></div>'
    +body
    +'</body></html>');
  popup.document.close();
}

}

// ── LOT 조회 페이지 ──
function searchLot(){
  const lot=document.getElementById('lot-inp').value.trim();
  const div=document.getElementById('lot-result');
  if(!lot){div.innerHTML='';return;}
  if(!DB||!DB.length){div.innerHTML='<p style="color:var(--g4)">DB 로딩 중...</p>';return;}
  const recs=DB.filter(r=>(r.LOT||r['LOT번호']||'').toUpperCase().includes(lot.toUpperCase()));
  if(!recs.length){div.innerHTML='<div class="empty">LOT <b>'+lot+'</b> 데이터 없음</div>';return;}
  const lots=new Set();recs.forEach(r=>lots.add(r.LOT||r['LOT번호']||''));
  let h='<div style="margin-top:12px">';
  [...lots].forEach(lv=>{
    const r=recs.find(x=>(x.LOT||x['LOT번호']||'')===lv)||recs[0];
    const nm=getV(r,'nm');const cd=r.품목코드||'';
    h+='<div style="background:#fff;border:1.5px solid var(--g2);border-radius:8px;padding:14px 18px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between">'
      +'<div><div style="font-size:16px;font-weight:700;color:var(--blue)">'+lv+'</div><div style="font-size:12px;color:var(--g5);margin-top:2px">'+nm+(cd?' ('+cd+')':'')+'</div></div>'
      +'<button class="btn btn-primary" onclick="openLot('+JSON.stringify(lv)+','+JSON.stringify(nm)+','+JSON.stringify(cd)+')">🔍 추적창 열기</button>'
      +'</div>';
  });
  div.innerHTML=h+'</div>';
}
</script>
</body>
</html>
