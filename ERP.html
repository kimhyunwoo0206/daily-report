<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>㈜위드프레쉬 생산일보 ERP</title>
<style>
  :root {
    --navy: #0d2137;
    --navy2: #1a3a5c;
    --blue: #1e6fb5;
    --blue-light: #e8f2fb;
    --teal: #0d8a72;
    --teal-light: #e4f5f1;
    --amber: #d4820a;
    --amber-light: #fef3e0;
    --red: #c0392b;
    --red-light: #fdecea;
    --gray1: #f7f8fa;
    --gray2: #eef0f3;
    --gray3: #d0d4db;
    --gray4: #8c95a3;
    --gray5: #3d4551;
    --text: #1a2130;
    --white: #ffffff;
    --radius: 8px;
    --shadow: 0 2px 8px rgba(0,0,0,0.08);
    --shadow-lg: 0 4px 20px rgba(0,0,0,0.12);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; background: var(--gray1); color: var(--text); font-size: 14px; line-height: 1.6; }

  /* ── 로그인 ── */
  #login-screen {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, var(--navy) 0%, var(--navy2) 100%);
  }
  .login-box {
    background: var(--white); border-radius: 16px; padding: 48px 40px;
    width: 360px; box-shadow: var(--shadow-lg);
  }
  .login-logo { text-align: center; margin-bottom: 32px; }
  .login-logo .co { font-size: 13px; color: var(--gray4); letter-spacing: 0.05em; }
  .login-logo .title { font-size: 20px; font-weight: 700; color: var(--navy); margin-top: 4px; }
  .login-logo .sub { font-size: 12px; color: var(--teal); margin-top: 2px; font-weight: 600; letter-spacing: 0.08em; }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--gray5); margin-bottom: 6px; }
  .form-group input {
    width: 100%; padding: 10px 14px; border: 1.5px solid var(--gray3);
    border-radius: var(--radius); font-size: 14px; transition: border-color 0.2s;
    outline: none;
  }
  .form-group input:focus { border-color: var(--blue); }
  .btn-login {
    width: 100%; padding: 12px; background: var(--navy); color: var(--white);
    border: none; border-radius: var(--radius); font-size: 15px; font-weight: 600;
    cursor: pointer; margin-top: 8px; transition: background 0.2s;
  }
  .btn-login:hover { background: var(--navy2); }
  .login-err { color: var(--red); font-size: 12px; text-align: center; margin-top: 10px; min-height: 18px; }

  /* ── 앱 레이아웃 ── */
  #app { display: none; min-height: 100vh; flex-direction: column; }
  .topbar {
    background: var(--navy); color: var(--white); padding: 0 24px;
    height: 56px; display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  .topbar-left { display: flex; align-items: center; gap: 16px; }
  .topbar-logo { font-size: 16px; font-weight: 700; letter-spacing: -0.02em; }
  .topbar-logo span { color: #64b5f6; }
  .topbar-nav { display: flex; gap: 4px; }
  .nav-btn {
    padding: 6px 14px; border-radius: 6px; border: none; cursor: pointer;
    font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.7);
    background: transparent; transition: all 0.15s;
  }
  .nav-btn:hover { background: rgba(255,255,255,0.1); color: var(--white); }
  .nav-btn.active { background: var(--blue); color: var(--white); }
  .topbar-right { display: flex; align-items: center; gap: 12px; }
  .user-badge {
    font-size: 12px; color: rgba(255,255,255,0.7);
    background: rgba(255,255,255,0.1); padding: 4px 10px; border-radius: 20px;
  }
  .btn-logout {
    font-size: 12px; color: rgba(255,255,255,0.6); background: transparent;
    border: 1px solid rgba(255,255,255,0.2); padding: 4px 10px; border-radius: 6px;
    cursor: pointer; transition: all 0.15s;
  }
  .btn-logout:hover { color: var(--white); border-color: rgba(255,255,255,0.5); }

  /* ── 메인 콘텐츠 ── */
  .main { flex: 1; padding: 24px; max-width: 1200px; margin: 0 auto; width: 100%; }
  .page { display: none; }
  .page.active { display: block; }

  /* ── 카드 ── */
  .card {
    background: var(--white); border-radius: var(--radius);
    box-shadow: var(--shadow); margin-bottom: 16px;
  }
  .card-header {
    padding: 16px 20px; border-bottom: 1px solid var(--gray2);
    display: flex; align-items: center; justify-content: space-between;
  }
  .card-title { font-size: 15px; font-weight: 700; color: var(--navy); }
  .card-body { padding: 20px; }

  /* ── 조회 필터 ── */
  .filter-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .filter-row input[type=date], .filter-row input[type=text], .filter-row select {
    padding: 8px 12px; border: 1.5px solid var(--gray3); border-radius: var(--radius);
    font-size: 13px; outline: none; transition: border-color 0.2s;
  }
  .filter-row input:focus, .filter-row select:focus { border-color: var(--blue); }

  /* ── 버튼 ── */
  .btn {
    padding: 8px 16px; border-radius: var(--radius); border: none;
    font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .btn-primary { background: var(--blue); color: var(--white); }
  .btn-primary:hover { background: #1558a0; }
  .btn-success { background: var(--teal); color: var(--white); }
  .btn-success:hover { background: #0a7060; }
  .btn-warning { background: var(--amber); color: var(--white); }
  .btn-warning:hover { background: #b86f08; }
  .btn-danger { background: var(--red); color: var(--white); }
  .btn-danger:hover { background: #a93226; }
  .btn-outline { background: var(--white); color: var(--navy); border: 1.5px solid var(--gray3); }
  .btn-outline:hover { border-color: var(--blue); color: var(--blue); }
  .btn-print { background: var(--gray5); color: var(--white); }
  .btn-print:hover { background: var(--navy); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── 상태 배지 ── */
  .badge {
    display: inline-block; padding: 3px 10px; border-radius: 20px;
    font-size: 11px; font-weight: 700; letter-spacing: 0.04em;
  }
  .badge-pending { background: var(--gray2); color: var(--gray5); }
  .badge-waiting { background: var(--amber-light); color: var(--amber); }
  .badge-done { background: var(--teal-light); color: var(--teal); }
  .badge-rejected { background: var(--red-light); color: var(--red); }

  /* ── 테이블 ── */
  .tbl-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th {
    background: var(--navy); color: var(--white); padding: 10px 12px;
    text-align: center; font-weight: 600; white-space: nowrap;
  }
  tbody tr:nth-child(even) { background: var(--gray1); }
  tbody tr:hover { background: var(--blue-light); }
  tbody td { padding: 8px 12px; border-bottom: 1px solid var(--gray2); text-align: center; }
  tbody td.left { text-align: left; }
  .section-header td {
    background: var(--navy2); color: var(--white); font-weight: 700;
    padding: 8px 12px; text-align: left; font-size: 12px; letter-spacing: 0.05em;
  }

  /* ── 일보 목록 카드 ── */
  .ilbo-list { display: flex; flex-direction: column; gap: 8px; }
  .ilbo-item {
    border: 1.5px solid var(--gray2); border-radius: var(--radius);
    padding: 14px 20px; display: flex; align-items: center;
    justify-content: space-between; cursor: pointer; transition: all 0.15s;
    background: var(--white);
  }
  .ilbo-item:hover { border-color: var(--blue); box-shadow: var(--shadow); }
  .ilbo-item-left { display: flex; align-items: center; gap: 16px; }
  .ilbo-date { font-size: 16px; font-weight: 700; color: var(--navy); }
  .ilbo-meta { font-size: 12px; color: var(--gray4); }
  .ilbo-item-right { display: flex; align-items: center; gap: 10px; }

  /* ── 일보 상세 ── */
  .ilbo-detail-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px; flex-wrap: wrap; gap: 12px;
  }
  .ilbo-detail-title { font-size: 18px; font-weight: 700; color: var(--navy); }
  .detail-actions { display: flex; gap: 8px; flex-wrap: wrap; }

  /* ── 결재선 표시 ── */
  .approval-bar {
    display: flex; gap: 0; border: 1.5px solid var(--gray3);
    border-radius: var(--radius); overflow: hidden; margin-bottom: 20px;
  }
  .approval-step {
    flex: 1; padding: 12px 16px; text-align: center; border-right: 1px solid var(--gray3);
  }
  .approval-step:last-child { border-right: none; }
  .approval-step .step-role { font-size: 11px; color: var(--gray4); margin-bottom: 4px; }
  .approval-step .step-name { font-size: 13px; font-weight: 700; color: var(--navy); }
  .approval-step .step-status { font-size: 11px; margin-top: 4px; }
  .approval-step.done { background: var(--teal-light); }
  .approval-step.waiting { background: var(--amber-light); }
  .approval-step.pending { background: var(--gray1); }

  /* ── LOT 추적 ── */
  .lot-result { margin-top: 20px; }
  .lot-timeline { position: relative; padding-left: 32px; }
  .lot-timeline::before {
    content: ''; position: absolute; left: 10px; top: 0; bottom: 0;
    width: 2px; background: var(--gray3);
  }
  .lot-node {
    position: relative; margin-bottom: 16px; background: var(--white);
    border: 1.5px solid var(--gray2); border-radius: var(--radius); padding: 14px 16px;
  }
  .lot-node::before {
    content: ''; position: absolute; left: -26px; top: 18px;
    width: 12px; height: 12px; border-radius: 50%; border: 2px solid var(--white);
  }
  .lot-node.type-입고::before { background: var(--blue); }
  .lot-node.type-생산::before { background: var(--teal); }
  .lot-node.type-투입::before { background: var(--amber); }
  .lot-node.type-출고::before { background: var(--red); }
  .lot-node-header { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .lot-node-type {
    font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 4px;
  }
  .type-입고 .lot-node-type { background: var(--blue-light); color: var(--blue); }
  .type-생산 .lot-node-type { background: var(--teal-light); color: var(--teal); }
  .type-투입 .lot-node-type { background: var(--amber-light); color: var(--amber); }
  .type-출고 .lot-node-type { background: var(--red-light); color: var(--red); }
  .lot-node-date { font-size: 12px; color: var(--gray4); }
  .lot-node-main { font-size: 14px; font-weight: 600; color: var(--navy); }
  .lot-node-detail { font-size: 12px; color: var(--gray5); margin-top: 4px; }

  /* ── 로딩 ── */
  .loading {
    text-align: center; padding: 48px; color: var(--gray4); font-size: 14px;
  }
  .spinner {
    display: inline-block; width: 24px; height: 24px; border: 3px solid var(--gray3);
    border-top-color: var(--blue); border-radius: 50%; animation: spin 0.8s linear infinite;
    margin-bottom: 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── 인쇄 ── */
  @media print {
    .topbar, .nav-btn, .btn, .filter-row, #lot-page, .approval-bar { display: none !important; }
    .card { box-shadow: none; border: 1px solid #ccc; }
    body { background: white; }
    .print-header { display: block !important; }
  }
  .print-header { display: none; text-align: center; margin-bottom: 20px; }
  .print-header h2 { font-size: 18px; font-weight: 700; }
  .print-header p { font-size: 12px; color: #666; margin-top: 4px; }

  /* ── 유틸 ── */
  .empty { text-align: center; padding: 40px; color: var(--gray4); }
  .row { display: flex; gap: 16px; flex-wrap: wrap; }
  .col { flex: 1; min-width: 200px; }
  .text-right { text-align: right; }
  .mt8 { margin-top: 8px; }
  .mt16 { margin-top: 16px; }
  .gap8 { gap: 8px; }
</style>
</head>
<body>

<!-- ══════════════════════════════════════
     로그인 화면
══════════════════════════════════════ -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <div class="co">㈜위드프레쉬</div>
      <div class="title">생산일보 ERP</div>
      <div class="sub">PRODUCTION DAILY REPORT</div>
    </div>
    <div class="form-group">
      <label>아이디</label>
      <input type="text" id="inp-id" placeholder="아이디 입력" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div class="form-group">
      <label>비밀번호</label>
      <input type="password" id="inp-pw" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn-login" onclick="doLogin()">로그인</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- ══════════════════════════════════════
     메인 앱
══════════════════════════════════════ -->
<div id="app">
  <!-- 상단바 -->
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-logo">위드프레쉬 <span>ERP</span></div>
      <div class="topbar-nav">
        <button class="nav-btn active" onclick="showPage('ilbo')">📋 일보 결재</button>
        <button class="nav-btn" onclick="showPage('lot')">🔍 LOT 추적</button>
      </div>
    </div>
    <div class="topbar-right">
      <span class="user-badge" id="user-badge"></span>
      <button class="btn-logout" onclick="doLogout()">로그아웃</button>
    </div>
  </div>

  <div class="main">

    <!-- ── 일보 결재 페이지 ── -->
    <div class="page active" id="ilbo-page">

      <!-- 목록 -->
      <div id="ilbo-list-view">
        <div class="card">
          <div class="card-header">
            <span class="card-title">📋 일보 목록</span>
            <div class="filter-row">
              <input type="month" id="filter-month" onchange="loadIlboList()">
              <button class="btn btn-outline" onclick="loadIlboList()">조회</button>
            </div>
          </div>
          <div class="card-body">
            <div id="ilbo-list-body"><div class="loading"><div class="spinner"></div><br>불러오는 중...</div></div>
          </div>
        </div>
      </div>

      <!-- 상세 -->
      <div id="ilbo-detail-view" style="display:none">
        <div class="ilbo-detail-header">
          <div>
            <button class="btn btn-outline" onclick="showIlboList()" style="margin-bottom:8px">← 목록으로</button>
            <div class="ilbo-detail-title" id="detail-title">생산 및 물류일보</div>
          </div>
          <div class="detail-actions" id="detail-actions"></div>
        </div>

        <!-- 결재선 -->
        <div class="approval-bar" id="approval-bar">
          <div class="approval-step" id="step-admin">
            <div class="step-role">작성자</div>
            <div class="step-name">김현우 공장장</div>
            <div class="step-status" id="step-admin-status">-</div>
          </div>
          <div class="approval-step" id="step-ceo">
            <div class="step-role">대표이사</div>
            <div class="step-name">전경진 대표</div>
            <div class="step-status" id="step-ceo-status">-</div>
          </div>
        </div>

        <!-- 인쇄 헤더 -->
        <div class="print-header">
          <h2>생산 및 물류일보</h2>
          <p id="print-date-label"></p>
          <p>㈜위드프레쉬</p>
        </div>

        <!-- 표1 -->
        <div class="card">
          <div class="card-header"><span class="card-title">표 1. 원료·부재료·반제품 매입 및 투입내역</span></div>
          <div class="card-body">
            <div class="tbl-wrap">
              <table id="tbl1">
                <thead><tr>
                  <th>구분</th><th>품목코드</th><th>품목명</th><th>LOT번호</th>
                  <th>규격</th><th>전일재고</th><th>입고</th><th>생산</th>
                  <th>투입</th><th>출고</th><th>현재고</th><th>비고</th>
                </tr></thead>
                <tbody id="tbody1"></tbody>
              </table>
            </div>
          </div>
        </div>

        <!-- 표2 -->
        <div class="card">
          <div class="card-header"><span class="card-title">표 2. 당일 생산내역</span></div>
          <div class="card-body">
            <div class="tbl-wrap">
              <table id="tbl2">
                <thead><tr>
                  <th>구분</th><th>품목코드</th><th>품목명</th><th>LOT번호</th>
                  <th>규격</th><th>전일재고</th><th>입고</th><th>생산</th>
                  <th>투입</th><th>출고</th><th>현재고</th><th>비고</th>
                </tr></thead>
                <tbody id="tbody2"></tbody>
              </table>
            </div>
          </div>
        </div>

        <!-- 표3 -->
        <div class="card">
          <div class="card-header"><span class="card-title">표 3. 제품 출고내역</span></div>
          <div class="card-body">
            <div class="tbl-wrap">
              <table id="tbl3">
                <thead><tr>
                  <th>구분</th><th>품목코드</th><th>품목명</th><th>LOT번호</th>
                  <th>규격</th><th>전일재고</th><th>입고</th><th>생산</th>
                  <th>투입</th><th>출고</th><th>현재고</th><th>비고</th>
                </tr></thead>
                <tbody id="tbody3"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- ── LOT 추적 페이지 ── -->
    <div class="page" id="lot-page">
      <div class="card">
        <div class="card-header">
          <span class="card-title">🔍 LOT 추적</span>
        </div>
        <div class="card-body">
          <div class="filter-row">
            <input type="text" id="lot-input" placeholder="LOT번호 입력 (예: R260526, P260526)" style="width:280px"
              onkeydown="if(event.key==='Enter')searchLot()">
            <button class="btn btn-primary" onclick="searchLot()">추적 조회</button>
          </div>
          <div id="lot-result" class="lot-result"></div>
        </div>
      </div>
    </div>

  </div><!-- /main -->
</div><!-- /app -->

<script>
// ══════════════════════════════════════
// 설정
// ══════════════════════════════════════
const FB = 'https://widfresh-erplot-default-rtdb.asia-southeast1.firebasedatabase.app';

const ACCOUNTS = {
  'admin': { pw: 'wf2024!', name: '김현우 공장장', role: 'admin' },
  'ceo':   { pw: 'ceo2024!', name: '전경진 대표', role: 'ceo' },
  'qc':    { pw: 'qc1234', name: 'QC 열람', role: 'qc' }
};

let currentUser = null;
let currentDate = null;
let currentApproval = null;

// ══════════════════════════════════════
// 로그인
// ══════════════════════════════════════
function doLogin() {
  const id = document.getElementById('inp-id').value.trim();
  const pw = document.getElementById('inp-pw').value;
  const err = document.getElementById('login-err');

  const acc = ACCOUNTS[id];
  if (!acc || acc.pw !== pw) {
    err.textContent = '아이디 또는 비밀번호가 올바르지 않습니다.';
    return;
  }
  err.textContent = '';
  currentUser = { id, ...acc };
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('user-badge').textContent = acc.name;

  // 이달 기본 설정
  const now = new Date();
  document.getElementById('filter-month').value =
    now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0');

  loadIlboList();
}

function doLogout() {
  currentUser = null;
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('inp-id').value = '';
  document.getElementById('inp-pw').value = '';
}

// ══════════════════════════════════════
// 페이지 전환
// ══════════════════════════════════════
function showPage(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(page+'-page').classList.add('active');
  event.target.classList.add('active');
}

// ══════════════════════════════════════
// 일보 목록 로드
// ══════════════════════════════════════
async function loadIlboList() {
  const body = document.getElementById('ilbo-list-body');
  body.innerHTML = '<div class="loading"><div class="spinner"></div><br>불러오는 중...</div>';

  const month = document.getElementById('filter-month').value; // YYYY-MM

  try {
    const res = await fetch(`${FB}/일보.json`);
    const data = await res.json();

    if (!data) {
      body.innerHTML = '<div class="empty">등록된 일보가 없습니다.</div>';
      return;
    }

    // 날짜 필터 + 정렬
    let dates = Object.keys(data)
      .filter(d => d.startsWith(month))
      .sort((a,b) => b.localeCompare(a));

    // QC는 결재완료만
    if (currentUser.role === 'qc') {
      dates = dates.filter(d => data[d].결재상태 && data[d].결재상태.상태 === '결재완료');
    }

    if (dates.length === 0) {
      body.innerHTML = '<div class="empty">해당 월의 일보가 없습니다.</div>';
      return;
    }

    const list = document.createElement('div');
    list.className = 'ilbo-list';

    dates.forEach(d => {
      const st = data[d].결재상태 || { 상태: '미결재', 담당자결재: false, 대표결재: false };
      const badgeClass = {
        '미결재': 'badge-pending',
        '결재중': 'badge-waiting',
        '결재완료': 'badge-done',
        '반려': 'badge-rejected'
      }[st.상태] || 'badge-pending';

      const item = document.createElement('div');
      item.className = 'ilbo-item';
      item.innerHTML = `
        <div class="ilbo-item-left">
          <div class="ilbo-date">${d}</div>
          <div class="ilbo-meta">${weekday(d)}</div>
        </div>
        <div class="ilbo-item-right">
          <span class="badge ${badgeClass}">${st.상태}</span>
          <span style="color:var(--gray4);font-size:12px">›</span>
        </div>`;
      item.onclick = () => loadIlboDetail(d, data[d]);
      list.appendChild(item);
    });

    body.innerHTML = '';
    body.appendChild(list);

  } catch(e) {
    body.innerHTML = '<div class="empty">데이터를 불러오지 못했습니다.<br>' + e.message + '</div>';
  }
}

function weekday(dateStr) {
  const days = ['일','월','화','수','목','금','토'];
  return days[new Date(dateStr).getDay()] + '요일';
}

// ══════════════════════════════════════
// 일보 상세
// ══════════════════════════════════════
async function loadIlboDetail(dateStr, data) {
  currentDate = dateStr;
  currentApproval = data.결재상태 || { 상태: '미결재', 담당자결재: false, 대표결재: false };

  document.getElementById('ilbo-list-view').style.display = 'none';
  document.getElementById('ilbo-detail-view').style.display = 'block';
  document.getElementById('detail-title').textContent =
    `생산 및 물류일보 — ${dateStr} (${weekday(dateStr)})`;
  document.getElementById('print-date-label').textContent = dateStr;

  // 결재선 렌더
  renderApprovalBar();
  renderDetailActions();

  // 표 렌더
  renderTable('tbody1', data.표1);
  renderTable('tbody2', data.표2);
  renderTable('tbody3', data.표3);
}

function renderApprovalBar() {
  const ap = currentApproval;
  const stepAdmin = document.getElementById('step-admin');
  const stepCeo   = document.getElementById('step-ceo');

  stepAdmin.className = 'approval-step ' + (ap.담당자결재 ? 'done' : (ap.상태==='미결재' ? 'waiting' : 'pending'));
  stepCeo.className   = 'approval-step ' + (ap.대표결재 ? 'done' : (ap.담당자결재 ? 'waiting' : 'pending'));

  document.getElementById('step-admin-status').innerHTML =
    ap.담당자결재 ? '<span style="color:var(--teal)">✔ 상신완료</span>' : '<span style="color:var(--amber)">대기중</span>';
  document.getElementById('step-ceo-status').innerHTML =
    ap.대표결재 ? '<span style="color:var(--teal)">✔ 승인완료</span>' :
    ap.상태==='반려' ? '<span style="color:var(--red)">✘ 반려</span>' :
    ap.담당자결재 ? '<span style="color:var(--amber)">승인 대기</span>' : '<span style="color:var(--gray4)">-</span>';
}

function renderDetailActions() {
  const ap = currentApproval;
  const role = currentUser.role;
  const div = document.getElementById('detail-actions');
  div.innerHTML = '';

  // 인쇄 버튼 (공통)
  if (role === 'qc' || ap.상태 === '결재완료') {
    addBtn(div, '🖨️ 인쇄', 'btn-print', () => window.print());
  }

  if (role === 'admin') {
    if (ap.상태 === '미결재' || ap.상태 === '반려') {
      addBtn(div, '✅ 상신', 'btn-success', submitApproval);
    }
  }
  if (role === 'ceo') {
    if (ap.담당자결재 && !ap.대표결재) {
      addBtn(div, '✔ 승인', 'btn-success', approveCeo);
      addBtn(div, '✘ 반려', 'btn-danger', rejectCeo);
    }
    if (ap.상태 === '결재완료') {
      addBtn(div, '🖨️ 인쇄', 'btn-print', () => window.print());
    }
  }
}

function addBtn(container, label, cls, fn) {
  const b = document.createElement('button');
  b.className = 'btn ' + cls;
  b.innerHTML = label;
  b.onclick = fn;
  container.appendChild(b);
}

function renderTable(tbodyId, tableData) {
  const tbody = document.getElementById(tbodyId);
  tbody.innerHTML = '';
  if (!tableData) {
    tbody.innerHTML = '<tr><td colspan="12" class="empty">데이터 없음</td></tr>';
    return;
  }
  const rows = Object.values(tableData).sort((a,b) => 0);
  rows.forEach(r => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${r.구분||''}</td>
      <td>${r.품목코드||''}</td>
      <td class="left">${r.품목명||''}</td>
      <td><a href="#" onclick="quickLot('${r.LOT||''}');return false"
         style="color:var(--blue);text-decoration:none;font-weight:600">${r.LOT||''}</a></td>
      <td>${r.규격||''}</td>
      <td class="text-right">${fmt(r.전일재고)}</td>
      <td class="text-right">${fmt(r.입고)}</td>
      <td class="text-right">${fmt(r.생산)}</td>
      <td class="text-right">${fmt(r.투입)}</td>
      <td class="text-right">${fmt(r.출고)}</td>
      <td class="text-right">${fmt(r.현재고)}</td>
      <td class="left">${r.비고||''}</td>`;
    tbody.appendChild(tr);
  });
}

function fmt(v) {
  if (v === undefined || v === null || v === 0 || v === '0') return '-';
  const n = parseFloat(v);
  if (isNaN(n) || n === 0) return '-';
  return n.toLocaleString('ko-KR', {maximumFractionDigits: 3});
}

function showIlboList() {
  document.getElementById('ilbo-list-view').style.display = 'block';
  document.getElementById('ilbo-detail-view').style.display = 'none';
  loadIlboList();
}

// ══════════════════════════════════════
// 결재 처리
// ══════════════════════════════════════
async function submitApproval() {
  if (!confirm(`${currentDate} 일보를 결재 상신합니까?`)) return;
  await updateApproval({ 담당자결재: true, 대표결재: false, 상태: '결재중' });
  alert('상신 완료되었습니다. 대표님 승인을 기다립니다.');
}

async function approveCeo() {
  if (!confirm(`${currentDate} 일보를 최종 승인합니까?`)) return;
  await updateApproval({ 담당자결재: true, 대표결재: true, 상태: '결재완료' });
  alert('승인 완료되었습니다.');
}

async function rejectCeo() {
  const reason = prompt('반려 사유를 입력하세요:');
  if (reason === null) return;
  await updateApproval({ 담당자결재: false, 대표결재: false, 상태: '반려', 반려사유: reason });
  alert('반려 처리되었습니다.');
}

async function updateApproval(newStatus) {
  const payload = { ...currentApproval, ...newStatus, 날짜: currentDate };
  await fetch(`${FB}/일보/${currentDate}/결재상태.json`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  });
  currentApproval = payload;
  renderApprovalBar();
  renderDetailActions();
}

// ══════════════════════════════════════
// LOT 추적
// ══════════════════════════════════════
function quickLot(lot) {
  document.getElementById('lot-input').value = lot;
  // LOT 추적 페이지로 전환
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('lot-page').classList.add('active');
  document.querySelectorAll('.nav-btn')[1].classList.add('active');
  searchLot();
}

async function searchLot() {
  const lotNo = document.getElementById('lot-input').value.trim().toUpperCase();
  const resultDiv = document.getElementById('lot-result');
  if (!lotNo) { resultDiv.innerHTML = ''; return; }

  resultDiv.innerHTML = '<div class="loading"><div class="spinner"></div><br>추적 중...</div>';

  try {
    // 수불DB 전체에서 LOT 검색
    const res = await fetch(`${FB}/수불DB.json`);
    const allBatches = await res.json();

    const matched = [];
    if (allBatches) {
      Object.values(allBatches).forEach(batch => {
        if (!batch) return;
        Object.values(batch).forEach(row => {
          if (!row || !row.LOT) return;
          if (row.LOT.toUpperCase().includes(lotNo)) {
            matched.push(row);
          }
        });
      });
    }

    if (matched.length === 0) {
      resultDiv.innerHTML = `<div class="empty">LOT번호 <b>${lotNo}</b>에 해당하는 데이터가 없습니다.</div>`;
      return;
    }

    // 날짜순 정렬
    matched.sort((a,b) => new Date(a.날짜) - new Date(b.날짜));

    // 타입 분류
    const typeMap = { '입고':'입고','반입':'입고','매입':'입고','생산':'생산','반출':'투입','투입':'투입','출고':'출고' };
    function getType(wt) {
      for (const [k,v] of Object.entries(typeMap)) {
        if (wt && wt.includes(k)) return v;
      }
      return '기타';
    }

    // 요약
    const summary = { 입고: 0, 생산: 0, 투입: 0, 출고: 0 };
    matched.forEach(r => {
      const t = getType(r.작업구분);
      if (summary[t] !== undefined) summary[t] += Math.abs(parseFloat(r.수량)||0);
    });

    let html = `
      <div class="card mt16">
        <div class="card-header">
          <span class="card-title">LOT: ${lotNo} — 총 ${matched.length}건</span>
          <div style="display:flex;gap:16px;font-size:12px">
            <span style="color:var(--blue)">입고 ${summary.입고}</span>
            <span style="color:var(--teal)">생산 ${summary.생산}</span>
            <span style="color:var(--amber)">투입 ${summary.투입}</span>
            <span style="color:var(--red)">출고 ${summary.출고}</span>
          </div>
        </div>
        <div class="card-body">
          <div class="lot-timeline">`;

    matched.forEach(r => {
      const t = getType(r.작업구분);
      html += `
        <div class="lot-node type-${t}">
          <div class="lot-node-header">
            <span class="lot-node-type">${r.작업구분||t}</span>
            <span class="lot-node-date">${r.날짜}</span>
          </div>
          <div class="lot-node-main">${r.품목명||''}</div>
          <div class="lot-node-detail">
            LOT: ${r.LOT||''} &nbsp;|&nbsp;
            수량: <b>${r.수량||0}</b> ${r.단위||''} &nbsp;|&nbsp;
            품목코드: ${r.품목코드||''} ${r.비고 ? '| '+r.비고 : ''}
          </div>
        </div>`;
    });

    html += `</div></div></div>`;
    resultDiv.innerHTML = html;

  } catch(e) {
    resultDiv.innerHTML = '<div class="empty">조회 중 오류가 발생했습니다.<br>' + e.message + '</div>';
  }
}
</script>
