<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>위드프레쉬 현장 일보</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js" defer></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth-compat.js" defer></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js" defer></script>
</head>
<body class="bg-slate-100 text-slate-800 pb-28">

    <header class="bg-blue-700 text-white p-4 shadow-md sticky top-0 z-10">
        <h1 class="text-xl font-bold flex items-center justify-between">
            ㈜위드프레쉬 일보 
            <span id="cloud-status" class="text-xs bg-slate-500/80 px-2 py-1 rounded-full text-white shadow-inner">연결 확인중...</span>
        </h1>
    </header>

    <main class="max-w-lg mx-auto p-4 mt-2">
        <div class="bg-white rounded-xl shadow-sm border p-3 mb-4 flex items-center justify-between">
            <label class="font-bold text-slate-700">작업일자</label>
            <input type="date" id="entry-date" class="p-2 bg-slate-50 border rounded-lg font-semibold outline-none text-blue-700">
        </div>

        <div class="bg-white rounded-2xl shadow-sm border p-5 mb-6">
            <form id="entry-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold mb-1 text-slate-600">작업구분</label>
                    <select id="work-type" class="w-full p-3 bg-slate-50 border rounded-xl outline-none font-bold" required>
                        <option value="">선택하세요</option>
                        <option value="원료매입입고">원료매입입고</option>
                        <option value="원료반입">원료반입</option>
                        <option value="원료반출">원료반출</option>
                        <option value="반제품생산">반제품생산</option>
                        <option value="완제품생산">완제품생산</option>
                        <option value="완제품출고">완제품출고</option>
                        <option value="원료출고">원료출고</option>
                        <option value="반제품출고">반제품출고</option>
                        <option value="부자재입고">부자재입고</option>
                        <option value="기초재고">기초재고</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-1 text-slate-600">품목명</label>
                    <input type="text" id="item-name" placeholder="예: 오징어25kg" class="w-full p-3 bg-slate-50 border rounded-xl outline-none" required>
                </div>
                <div class="flex gap-3">
                    <div class="flex-1">
                        <label class="block text-sm font-semibold mb-1 text-slate-600">수량 (+)</label>
                        <input type="number" id="qty" step="0.01" placeholder="양수 입력" class="w-full p-3 bg-slate-50 border rounded-xl outline-none" required>
                    </div>
                    <div class="flex-1">
                        <label class="block text-sm font-semibold mb-1 text-slate-600">LOT번호</label>
                        <input type="text" id="lot-no" placeholder="선택사항" class="w-full p-3 bg-slate-50 border rounded-xl outline-none">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-1 text-slate-600">비고</label>
                    <input type="text" id="note" placeholder="거래처 등 특이사항" class="w-full p-3 bg-slate-50 border rounded-xl outline-none">
                </div>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 rounded-xl shadow-md transition mt-2">내역 클라우드에 추가</button>
            </form>
        </div>

        <h2 class="font-bold text-slate-700 mb-2 px-1">오늘 입력된 내역</h2>
        <div id="records-container" class="space-y-3">
            <div id="empty-state" class="text-center py-8 text-slate-400 bg-white rounded-xl border border-dashed">
                <p class="text-sm" id="empty-message">데이터를 불러오는 중입니다...</p>
            </div>
        </div>
    </main>

    <div class="fixed bottom-0 left-0 w-full bg-white border-t p-4 flex gap-2 shadow-[0_-4px_10px_-1px_rgba(0,0,0,0.08)]">
        <button onclick="window.copyForExcel()" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3.5 rounded-xl shadow transition">엑셀 복사</button>
        <button onclick="window.dailyClose()" class="flex-1 bg-rose-600 hover:bg-rose-700 text-white font-bold py-3.5 rounded-xl shadow transition">일일 마감</button>
    </div>

    <script>
        // Firebase SDK가 defer로 로드되므로, 로드 완료 후 실행
        function initApp() {
            try {
                if (typeof firebase === 'undefined') {
                    document.getElementById('cloud-status').innerText = "⚠ Firebase 미로드";
                    document.getElementById('cloud-status').className = "text-xs bg-red-600 px-2 py-1 rounded-full text-white";
                    document.getElementById('empty-message').innerText = "Firebase 라이브러리를 불러오지 못했습니다. 인터넷 연결을 확인하세요.";
                    return;
                }

                // 공장장님의 진짜 열쇠
                const firebaseConfig = {
                    apiKey: "AIzaSyBEfvZtN3wXCDq2y0XBnPFQ_7WO5-VLV5I",
                    authDomain: "withfresh-7ed06.firebaseapp.com",
                    projectId: "withfresh-7ed06",
                    storageBucket: "withfresh-7ed06.firebasestorage.app",
                    messagingSenderId: "740477700551",
                    appId: "1:740477700551:web:39f660a87b55e7e29c31e2"
                };

                // 파이어베이스 시동
                if (!firebase.apps.length) {
                    firebase.initializeApp(firebaseConfig);
                }

                const auth = firebase.auth();
                const db = firebase.firestore();
                let allRecords = [];

                const dateInput = document.getElementById('entry-date');
                const tzoffset = (new Date()).getTimezoneOffset() * 60000;
                dateInput.value = (new Date(Date.now() - tzoffset)).toISOString().split('T')[0];

                // [수정완료] 화면 그리기 기능을 무조건 제일 먼저 정의합니다.
                window.renderRecords = function() {
                    var container = document.getElementById('records-container');
                    var emptyState = document.getElementById('empty-state');
                    
                    var filtered = allRecords.filter(function(r) { return r.date === dateInput.value; });
                    filtered.sort(function(a, b) { return b.createdAt - a.createdAt; });
                    
                    if(filtered.length === 0) {
                        emptyState.style.display = 'block';
                        document.getElementById('empty-message').innerText = "입력된 내역이 없습니다.";
                        container.innerHTML = '';
                        container.appendChild(emptyState);
                        return;
                    }

                    emptyState.style.display = 'none';
                    container.innerHTML = '';
                    
                    filtered.forEach(function(rec) {
                        var div = document.createElement('div');
                        var bgClass = rec.qty < 0 ? "bg-rose-50 border-rose-100" : (rec.workType.indexOf('생산') > -1 ? "bg-emerald-50 border-emerald-100" : "bg-white");
                        var textClass = rec.qty < 0 ? "text-rose-700" : (rec.workType.indexOf('생산') > -1 ? "text-emerald-700" : "text-slate-800");

                        div.className = bgClass + " p-4 rounded-xl shadow-sm border mb-3 relative";
                        div.innerHTML = `
                            <div class="flex justify-between text-xs font-bold mb-1">
                                <span class="bg-white px-2 py-1 rounded shadow-sm border text-slate-600">${rec.workType}</span>
                                <button onclick="window.deleteRecord('${rec.id}')" class="text-slate-400 hover:text-red-500 underline px-1">삭제</button>
                            </div>
                            <div class="font-bold text-lg mb-1">${rec.itemName}</div>
                            <div class="flex justify-between text-sm items-end">
                                <span class="text-slate-500">LOT: ${rec.lotNo}</span>
                                <span class="font-bold text-lg ${textClass}">${rec.qty}</span>
                            </div>
                            ${rec.note ? `<div class="mt-2 text-xs text-slate-500 bg-white/60 p-2 rounded">${rec.note}</div>` : ''}
                        `;
                        container.appendChild(div);
                    });
                };

                // 삭제 기능
                window.deleteRecord = function(id) {
                    if(confirm('이 내역을 삭제하시겠습니까?')) {
                        db.collection('production_logs').doc(id).delete();
                    }
                };

                // 엑셀 복사 기능
                window.copyForExcel = function() {
                    var filtered = allRecords.filter(function(r) { return r.date === dateInput.value; });
                    filtered.sort(function(a, b) { return a.createdAt - b.createdAt; });
                    if(filtered.length === 0) { alert("복사할 내역이 없습니다."); return; }
                    
                    var text = "";
                    filtered.forEach(function(r) { text += `${r.date}\t${r.workType}\t${r.itemName}\t\t\t${r.lotNo}\t${r.qty}\t\t${r.note}\n`; });
                    
                    var temp = document.createElement("textarea");
                    temp.value = text;
                    document.body.appendChild(temp);
                    temp.select();
                    document.execCommand('copy');
                    document.body.removeChild(temp);
                    alert('복사되었습니다! 카톡창이나 엑셀에 붙여넣기 하세요.');
                };

                // 일일 마감 기능
                window.dailyClose = function() {
                    var filtered = allRecords.filter(function(r) { return r.date === dateInput.value; });
                    if(filtered.length === 0) { alert("마감할 내역이 없습니다."); return; }

                    if(!confirm(`[${dateInput.value} 일일 마감]\n\n엑셀 복사는 다 하셨나요?\n확인을 누르면 오늘 데이터가 영구 삭제되고 내일 날짜로 넘어갑니다.`)) return;
                    
                    filtered.forEach(function(r) {
                        db.collection('production_logs').doc(r.id).delete();
                    });
                    
                    var nextDay = new Date(new Date(dateInput.value).getTime() + 86400000);
                    dateInput.value = nextDay.toISOString().split('T')[0];
                    window.renderRecords();
                    alert("마감 완료! 다음 날짜로 넘어갑니다.");
                };

                // 날짜 변경 이벤트
                dateInput.addEventListener('change', window.renderRecords);

                // 익명 로그인 시도 (재시도 포함)
                function trySignIn() {
                    document.getElementById('cloud-status').innerText = "연결 중...";
                    document.getElementById('cloud-status').className = "text-xs bg-slate-500/80 px-2 py-1 rounded-full text-white";
                    auth.signInAnonymously().catch(function(error) {
                        var msg = "접속 오류 [" + error.code + "]";
                        document.getElementById('cloud-status').innerText = msg;
                        document.getElementById('cloud-status').className = "text-xs bg-red-600 px-2 py-1 rounded-full text-white";
                        document.getElementById('empty-message').innerHTML =
                            '연결 실패: ' + error.code + '<br>' +
                            '<button onclick="trySignIn()" style="margin-top:8px;padding:6px 14px;background:#2563eb;color:#fff;border-radius:8px;font-weight:bold;">재시도</button>';
                        // 오류코드별 안내
                        if (error.code === 'auth/operation-not-allowed') {
                            document.getElementById('empty-message').innerHTML +=
                                '<p style="margin-top:6px;font-size:12px;color:#b91c1c;">Firebase 콘솔 → Authentication → 익명 로그인을 활성화해야 합니다.</p>';
                        }
                    });
                }
                trySignIn();

                // 연결 상태 감지
                auth.onAuthStateChanged(function(user) {
                    if (user) {
                        document.getElementById('cloud-status').innerText = "☁️ 클라우드 동기화됨";
                        document.getElementById('cloud-status').className = "text-xs bg-emerald-600 px-2 py-1 rounded-full text-white font-bold";
                        fetchRecords();
                    }
                });

                // 실시간 데이터 가져오기
                function fetchRecords() {
                    db.collection('production_logs').onSnapshot(function(snapshot) {
                        allRecords = [];
                        snapshot.forEach(function(doc) {
                            var data = doc.data();
                            data.id = doc.id;
                            allRecords.push(data);
                        });
                        window.renderRecords();
                    }, function(error) {
                        alert("데이터베이스 권한 오류: " + error.message);
                    });
                }

                // 데이터 저장 버튼
                document.getElementById('entry-form').addEventListener('submit', function(e) {
                    e.preventDefault();
                    if(!auth.currentUser) {
                        alert("서버와 연결되지 않았습니다.");
                        return;
                    }

                    var qty = parseFloat(document.getElementById('qty').value);
                    var workType = document.getElementById('work-type').value;
                    
                    if (workType.indexOf('반출') > -1 || workType.indexOf('출고') > -1 || workType.indexOf('투입') > -1) {
                        qty = -Math.abs(qty);
                    } else {
                        qty = Math.abs(qty);
                    }

                    db.collection('production_logs').add({
                        date: dateInput.value,
                        workType: workType,
                        itemName: document.getElementById('item-name').value,
                        qty: qty,
                        lotNo: document.getElementById('lot-no').value || '-',
                        note: document.getElementById('note').value || '',
                        createdAt: Date.now()
                    }).then(function() {
                        document.getElementById('item-name').value = '';
                        document.getElementById('qty').value = '';
                        document.getElementById('item-name').focus();
                    }).catch(function(error) {
                        alert("저장 실패: " + error.message);
                    });
                });

            } catch(e) {
                document.getElementById('cloud-status').innerText = "실행 에러";
                document.getElementById('cloud-status').className = "text-xs bg-red-600 px-2 py-1 rounded-full text-white";
                document.getElementById('empty-message').innerText = "오류: " + e.message;
                console.error(e);
            }
        }

        // defer 스크립트가 모두 로드된 뒤 실행
        document.addEventListener('DOMContentLoaded', function() {
            // Firebase SDK가 defer라 DOMContentLoaded 이후에도 약간 늦을 수 있으므로 짧게 대기
            var checkCount = 0;
            var checkInterval = setInterval(function() {
                checkCount++;
                if (typeof firebase !== 'undefined') {
                    clearInterval(checkInterval);
                    initApp();
                } else if (checkCount > 30) { // 3초 대기 후 포기
                    clearInterval(checkInterval);
                    document.getElementById('cloud-status').innerText = "⚠ 라이브러리 로드 실패";
                    document.getElementById('cloud-status').className = "text-xs bg-red-600 px-2 py-1 rounded-full text-white";
                    document.getElementById('empty-message').innerText = "인터넷 연결을 확인하고 페이지를 새로고침하세요.";
                }
            }, 100);
        });
    </script>
</body>
</html>
