<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>㈜위드프레쉬 BOM 매핑 편집기</title>
<style>
:root {
  --bg:#F4F6F9; --card:#FFF; --border:#DDE1E8;
  --primary:#0D5E9F; --primary-light:#E8F2FB;
  --accent:#0D8A72; --accent-light:#E8F7F4;
  --red:#C0392B; --amber:#C27A00; --amber-lt:#FEF3E0;
  --text:#1A2130; --sub:#6B7585;
  --sp:#1E6FB5; --rm:#C27A00; --am:#6B4C9A; --sm:#2E7D5A;
  --radius:8px; --shadow:0 2px 10px rgba(0,0,0,.07);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'맑은 고딕',sans-serif;background:var(--bg);color:var(--text);font-size:13px;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
.hd{background:var(--primary);color:#fff;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.18);}
.hd h1{font-size:15px;font-weight:700;}
.hd .sub{font-size:10px;opacity:.7;margin-top:1px;}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border-radius:6px;border:none;cursor:pointer;font-family:inherit;font-size:12px;font-weight:600;transition:all .15s;}
.btn-primary{background:var(--accent);color:#fff;} .btn-primary:hover{background:#0a7260;}
.btn-outline{background:transparent;color:#fff;border:1.5px solid rgba(255,255,255,.5);} .btn-outline:hover{background:rgba(255,255,255,.1);}
.btn-sm{padding:4px 10px;font-size:11px;border-radius:5px;}
.btn-danger{background:var(--red);color:#fff;}
.btn-amber{background:var(--amber);color:#fff;}
.fb-status{display:flex;align-items:center;gap:6px;font-size:11px;opacity:.85;}
.fb-dot{width:7px;height:7px;border-radius:50%;background:#aaa;flex-shrink:0;}
.fb-dot.ok{background:#4caf50;}
.fb-dot.err{background:#f44336;}
.fb-dot.loading{background:#ff9800;animation:blink .7s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.main{display:grid;grid-template-columns:260px 1fr 310px;gap:10px;padding:10px;flex:1;overflow:hidden;min-height:0;}
.panel{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);display:flex;flex-direction:column;overflow:hidden;}
.ph{padding:9px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.ph h2{font-size:12px;font-weight:700;color:var(--primary);}
.pb{flex:1;overflow-y:auto;padding:8px;}
.fp-search{width:100%;padding:6px 9px;border:1px solid var(--border);border-radius:6px;font-family:inherit;font-size:12px;margin-bottom:6px;}
.fp-search:focus{outline:none;border-color:var(--primary);}
.fp-item{padding:7px 9px;border-radius:6px;cursor:pointer;display:flex;align-items:center;gap:6px;border:1.5px solid transparent;margin-bottom:2px;transition:all .1s;}
.fp-item:hover{background:var(--primary-light);}
.fp-item.sel{background:var(--primary-light);border-color:var(--primary);}
.fp-item.is-new{background:#fffbea;}
.fp-code{font-size:9px;color:var(--sub);font-weight:700;background:#EEF0F3;padding:2px 5px;border-radius:4px;flex-shrink:0;}
.fp-name{font-size:11px;font-weight:500;line-height:1.3;flex:1;}
.fp-badge{font-size:10px;background:var(--accent);color:#fff;padding:1px 5px;border-radius:8px;flex-shrink:0;}
.cnt-chip{font-size:10px;background:#EEF0F3;padding:2px 7px;border-radius:10px;color:var(--sub);}
.new-badge{font-size:9px;background:var(--amber-lt);color:var(--amber);padding:1px 5px;border-radius:4px;font-weight:700;flex-shrink:0;}
.sel-bar{padding:9px 12px;border-bottom:1px solid var(--border);background:var(--primary-light);display:flex;align-items:center;gap:10px;flex-shrink:0;}
.sel-bar.empty{background:#F7F8FA;}
.sel-bar .code-badge{background:var(--primary);color:#fff;font-size:11px;font-weight:700;padding:3px 9px;border-radius:5px;flex-shrink:0;}
.sel-bar .fp-title{font-size:13px;font-weight:700;color:var(--primary);}
.mat-search-row{padding:8px 12px;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;flex-direction:column;gap:6px;}
.mat-search{width:100%;padding:6px 10px;border:1px solid var(--border);border-radius:6px;font-family:inherit;font-size:12px;}
.mat-search:focus{outline:none;border-color:var(--primary);}
.gbn-filters{display:flex;gap:5px;align-items:center;flex-wrap:wrap;}
.gf-btn{padding:3px 10px;border-radius:10px;border:1.5px solid var(--border);background:#fff;cursor:pointer;font-family:inherit;font-size:11px;font-weight:600;color:var(--sub);transition:all .12s;}
.gf-btn.on{color:#fff;border-color:transparent;}
.gf-btn[data-g="반제품"].on{background:var(--sp);}
.gf-btn[data-g="원료"].on{background:var(--rm);}
.gf-btn[data-g="부재료"].on{background:var(--am);}
.gf-btn[data-g="부자재"].on{background:var(--sm);}
.match-info{font-size:10px;color:var(--sub);}
.mat-list{flex:1;overflow-y:auto;padding:6px 12px;}
.gbn-hd{font-size:10px;font-weight:700;color:#fff;padding:3px 9px;border-radius:4px;display:inline-block;}
.gbn-hd.반제품{background:var(--sp);} .gbn-hd.원료{background:var(--rm);} .gbn-hd.부재료{background:var(--am);} .gbn-hd.부자재{background:var(--sm);}
.gbn-hd-row{display:flex;align-items:center;gap:8px;margin:8px 0 4px;}
.gbn-hd-row .gbn-sel-btn{font-size:10px;background:none;border:1px solid;border-radius:4px;padding:2px 6px;cursor:pointer;font-family:inherit;font-weight:600;}
.gbn-hd-row.반제품 .gbn-sel-btn{color:var(--sp);border-color:var(--sp);}
.gbn-hd-row.원료 .gbn-sel-btn{color:var(--rm);border-color:var(--rm);}
.gbn-hd-row.부재료 .gbn-sel-btn{color:var(--am);border-color:var(--am);}
.gbn-hd-row.부자재 .gbn-sel-btn{color:var(--sm);border-color:var(--sm);}
.gbn-cnt{font-size:10px;color:var(--sub);}
.mat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:3px;margin-bottom:4px;}
.mi{display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:5px;cursor:pointer;border:1.5px solid transparent;transition:all .1s;user-select:none;}
.mi:hover{background:#F4F6F9;} .mi.ck{background:var(--accent-light);border-color:var(--accent);}
.mi input[type=checkbox]{width:13px;height:13px;accent-color:var(--accent);flex-shrink:0;cursor:pointer;}
.mi label{font-size:11px;cursor:pointer;line-height:1.3;}
.mat-empty{padding:20px;text-align:center;color:var(--sub);font-size:12px;}
.bom-fp-header{padding:9px 12px;background:var(--primary-light);border-bottom:1px solid var(--border);flex-shrink:0;}
.bom-fp-header .code{font-size:10px;font-weight:700;background:var(--primary);color:#fff;padding:2px 7px;border-radius:4px;margin-right:6px;}
.bom-fp-header .nm{font-size:12px;font-weight:700;color:var(--primary);}
.bom-fp-header.empty .nm{color:var(--sub);font-weight:400;}
.bom-list{flex:1;overflow-y:auto;padding:8px;}
.bom-item{display:flex;align-items:center;gap:7px;padding:5px 8px;border-radius:6px;border-bottom:1px solid var(--border);margin-bottom:2px;}
.bom-item:last-child{border-bottom:none;} .bom-item:hover{background:#F7F8FA;}
.tag{display:inline-block;padding:2px 6px;border-radius:4px;font-size:9px;font-weight:700;color:#fff;flex-shrink:0;}
.tag.반제품{background:var(--sp);} .tag.원료{background:var(--rm);} .tag.부재료{background:var(--am);} .tag.부자재{background:var(--sm);}
.bom-name{font-size:11px;flex:1;}
.del-btn{background:none;border:none;cursor:pointer;color:var(--sub);font-size:13px;padding:2px 5px;border-radius:4px;flex-shrink:0;}
.del-btn:hover{background:#FFE8E6;color:var(--red);}
.bom-empty{padding:20px;text-align:center;color:var(--sub);font-size:11px;}
.bom-footer{padding:8px 12px;border-top:1px solid var(--border);display:flex;gap:6px;flex-shrink:0;}
.action-bar{background:var(--card);border-top:1px solid var(--border);padding:7px 16px;display:flex;align-items:center;gap:10px;justify-content:space-between;flex-shrink:0;}
.stats{font-size:11px;color:var(--sub);} .stats strong{color:var(--text);}
::-webkit-scrollbar{width:4px;height:4px;} ::-webkit-scrollbar-thumb{background:#CBD0D8;border-radius:3px;}
.toast{position:fixed;bottom:20px;right:20px;background:#1A2130;color:#fff;padding:9px 16px;border-radius:8px;font-size:12px;opacity:0;transform:translateY(6px);transition:all .2s;pointer-events:none;z-index:999;}
.toast.show{opacity:1;transform:translateY(0);}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;z-index:100;}
.modal-overlay.open{display:flex;}
.modal{background:var(--card);border-radius:10px;display:flex;flex-direction:column;box-shadow:0 8px 32px rgba(0,0,0,.22);}
.modal-head{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.modal-head h3{font-size:14px;font-weight:700;}
.modal-body{flex:1;overflow-y:auto;padding:16px;}
.close-btn{background:none;border:none;font-size:18px;cursor:pointer;color:var(--sub);}
.form-row{margin-bottom:14px;}
.form-row label{display:block;font-size:11px;font-weight:700;color:var(--sub);margin-bottom:5px;}
.form-row input{width:100%;padding:8px 11px;border:1.5px solid var(--border);border-radius:6px;font-family:inherit;font-size:13px;outline:none;}
.form-row input:focus{border-color:var(--primary);}
.form-err{color:var(--red);font-size:11px;margin-top:8px;min-height:16px;text-align:center;}
.form-btns{display:flex;gap:8px;margin-top:4px;}
.form-btns .btn{flex:1;justify-content:center;}
</style>
</head>
<body>
<div class="hd">
  <div>
    <h1>㈜위드프레쉬  BOM 매핑 편집기</h1>
    <div class="sub">완제품별 원료·반제품·부재료 구성 등록 → Firebase ERP 자동 연동</div>
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <div class="fb-status"><div class="fb-dot loading" id="fbDot"></div><span id="fbMsg">연결 중...</span></div>
    <button class="btn btn-outline" onclick="openAllBom()">📋 전체 BOM 보기</button>
    <button class="btn btn-outline" onclick="exportCSV()">📊 CSV 내보내기</button>
  </div>
</div>
<div class="main">
  <!-- ① 완제품 목록 -->
  <div class="panel">
    <div class="ph">
      <h2>완제품 목록</h2>
      <div style="display:flex;align-items:center;gap:6px">
        <span class="cnt-chip" id="fpCount">0</span>
        <button class="btn btn-sm btn-amber" onclick="openAddFpModal()">＋ 신규</button>
      </div>
    </div>
    <div class="pb">
      <button class="btn btn-amber" style="width:100%;justify-content:center;margin-bottom:8px;font-size:12px" onclick="openAddFpModal()">＋ 신규 완제품 추가</button>
      <input class="fp-search" id="fpSearch" placeholder="🔍 완제품명 / 코드 검색..." oninput="filterFP()">
      <div id="fpList"></div>
    </div>
  </div>
  <!-- ② 자재 선택 -->
  <div class="panel" style="display:flex;flex-direction:column;overflow:hidden;">
    <div class="sel-bar empty" id="selBar">
      <span style="color:var(--sub);font-size:12px">← 왼쪽에서 완제품을 선택하세요</span>
    </div>
    <div class="mat-search-row">
      <input class="mat-search" id="matSearch" placeholder="🔍 자재명 검색 (예: 오징어, 꽃게, 가리비...)" oninput="renderMatList()">
      <div style="display:flex;align-items:center;justify-content:space-between;">
        <div class="gbn-filters">
          <span style="font-size:10px;color:var(--sub);margin-right:2px">구분:</span>
          <button class="gf-btn on" data-g="반제품" onclick="toggleGbn(this)">반제품 <span id="gcnt-반제품">0</span></button>
          <button class="gf-btn on" data-g="원료" onclick="toggleGbn(this)">원료 <span id="gcnt-원료">0</span></button>
          <button class="gf-btn on" data-g="부재료" onclick="toggleGbn(this)">부재료 <span id="gcnt-부재료">0</span></button>
          <button class="gf-btn on" data-g="부자재" onclick="toggleGbn(this)">부자재 <span id="gcnt-부자재">0</span></button>
        </div>
        <span class="match-info" id="matchInfo"></span>
      </div>
    </div>
    <div class="mat-list" id="matList">
      <div class="mat-empty">← 완제품을 선택하면 자재 목록이 표시됩니다</div>
    </div>
  </div>
  <!-- ③ BOM 결과 -->
  <div class="panel" style="display:flex;flex-direction:column;overflow:hidden;">
    <div class="ph"><h2>BOM 구성</h2><span class="cnt-chip" id="bomCount"></span></div>
    <div class="bom-fp-header empty" id="bomFpHeader"><span class="nm">완제품을 선택하세요</span></div>
    <div class="bom-list" id="bomList"><div class="bom-empty">선택된 자재가 없습니다</div></div>
    <div class="bom-footer">
      <button class="btn btn-sm btn-danger" onclick="clearCurrentBom()" style="flex:1">초기화</button>
      <button class="btn btn-sm btn-primary" id="saveBtn" onclick="saveCurrent()" style="flex:1.8">💾 저장 → ERP 전송</button>
    </div>
  </div>
</div>
<div class="action-bar">
  <div class="stats" id="globalStats">전체 BOM 등록: <strong>0</strong>개 완제품, <strong>0</strong>개 자재 매핑</div>
  <div style="font-size:11px;color:var(--sub)" id="saveStatus"></div>
</div>
<div class="toast" id="toast"></div>

<!-- 신규 완제품 추가 모달 -->
<div class="modal-overlay" id="addFpModal" onclick="if(event.target===this)closeAddFp()">
  <div class="modal" style="width:380px">
    <div class="modal-head"><h3>＋ 신규 완제품 추가</h3><button class="close-btn" onclick="closeAddFp()">×</button></div>
    <div class="modal-body">
      <div class="form-row">
        <label>품목코드 <span style="color:#999;font-weight:400">(예: P-576)</span></label>
        <input type="text" id="newFpCode" placeholder="P-XXX" onkeydown="if(event.key==='Enter')document.getElementById('newFpName').focus()">
      </div>
      <div class="form-row">
        <label>완제품명</label>
        <input type="text" id="newFpName" placeholder="예: 손질병어300g" onkeydown="if(event.key==='Enter')confirmAddFp()">
      </div>
      <div class="form-err" id="addFpErr"></div>
      <div class="form-btns">
        <button class="btn btn-primary" onclick="confirmAddFp()">추가 →</button>
        <button class="btn" style="background:#eee;color:var(--text)" onclick="closeAddFp()">취소</button>
      </div>
    </div>
  </div>
</div>

<!-- 전체 BOM 모달 -->
<div class="modal-overlay" id="allBomModal" onclick="if(event.target===this)closeModal()">
  <div class="modal" style="width:740px;max-height:82vh;">
    <div class="modal-head"><h3>📋 전체 BOM 현황</h3><button class="close-btn" onclick="closeModal()">×</button></div>
    <div class="modal-body" id="allBomBody"></div>
  </div>
</div>

<script>
const FB = 'https://widfresh-erplot-default-rtdb.asia-southeast1.firebasedatabase.app';

const FG_BASE = [
  {code:"P-001",name:"가리비500g"},{code:"P-002",name:"곰곰_간장게장2.5kg"},{code:"P-003",name:"씨케이_양념게장600g"},{code:"P-004",name:"절단꽃게알배기700g"},{code:"P-005",name:"손질꽃게4절900g(경량)"},{code:"P-006",name:"참돔500g"},{code:"P-007",name:"자숙홍합10kg"},{code:"P-008",name:"자숙홍합1kg"},{code:"P-009",name:"손질통오징어320g(국내산)"},{code:"P-010",name:"참돔400g"},{code:"P-011",name:"참돔300g"},{code:"P-012",name:"참돔200g"},{code:"P-013",name:"손질꽃게4절500g"},{code:"P-014",name:"메가마트_간장게장500g"},{code:"P-015",name:"메가마트_양념게장300g"},{code:"P-016",name:"손질꽃게500g"},
  {code:"P-101",name:"위플_국내산간장게장1.2KG"},{code:"P-102",name:"위플_국내산양념게장500G"},{code:"P-103",name:"위플_절단꽃게1KG"},{code:"P-104",name:"위플_새우젓1.5kg"},{code:"P-105",name:"씨케이_살이꽉찬간장게장1.4KG"},{code:"P-106",name:"씨케이_국내산양념게장600g"},{code:"P-107",name:"씨케이_간장게장500g"},{code:"P-108",name:"씨케이_양념게장350g"},{code:"P-109",name:"도로블이_국내산양념게장600g"},{code:"P-110",name:"도로블이_알배기간장게장1.4KG"},{code:"P-111",name:"도로블이_블랙타이거새우500g"},{code:"P-112",name:"제철밥상_절단꽃게1KG"},{code:"P-113",name:"제철밥상_알배기꽃게500g"},{code:"P-114",name:"수산어보_양념게장500g"},{code:"P-115",name:"대명수산_손질꽃게1kg"},{code:"P-116",name:"메가마트_한입금게장(간장)500g"},{code:"P-117",name:"메가마트_한입금게장(양념)300g"},{code:"P-118",name:"곰곰_손질꽃게500g"},{code:"P-119",name:"곰곰_손질꽃게1KG"},{code:"P-120",name:"곰곰_간장게장1.8KG"},{code:"P-121",name:"곰곰_간장게장(냉장)2.5kg"},{code:"P-122",name:"곰곰_양념게장(냉장)1kg"},{code:"P-123",name:"두레생협_절단알배기꽃게700g"},{code:"P-124",name:"두레생협_손질꽃게700g"},
  {code:"P-201",name:"메가마트_손질갑오징어5kg"},{code:"P-202",name:"곰곰_데친문어(냉장)400g"},{code:"P-203",name:"곰곰_손질오징어250g"},{code:"P-204",name:"곰곰_손질오징어600g"},{code:"P-205",name:"손질통오징어320g(원양산)"},{code:"P-206",name:"삼천포상회_마른오징어100g"},{code:"P-207",name:"삼천포상회_반건오징어180g"},{code:"P-208",name:"두레생협_데친문어(냉장)300g"},{code:"P-209",name:"서풍_국산손질오징어(냉장)220g"},

// Firebase 연동
function setFbStatus(state, msg) {
  document.getElementById('fbDot').className = 'fb-dot ' + state;
  document.getElementById('fbMsg').textContent = msg;
}

async function loadFromFirebase() {
  setFbStatus('loading', '로딩 중...');
  try {
    const data = await fetch(FB + '/BOM_EDITS.json').then(r => r.json());
    if (data) {
      Object.entries(data).forEach(([code, items]) => {
        if (!Array.isArray(items)) return;
        bom[code] = items.map(it => ({gbn: it.gbn || '원료', name: it.name || ''})).filter(it => it.name);
        if (!FG.find(f => f.code === code)) {
          const fpName = (items[0] && items[0].fpName) || code;
          FG.push({code, name: fpName, isNew: true});
          NEW_FP.push(code);
        }
      });
      setFbStatus('ok', 'Firebase 연결됨');
    } else {
      setFbStatus('ok', 'Firebase 연결됨');
    }
  } catch(e) {
    setFbStatus('err', '연결 오류 — 오프라인');
  }
  renderFPList();
  updateStats();
}

async function saveToFirebase(code, fpName, items) {
  const erp = items.map(it => ({gbn: it.gbn, name: it.name, fpName: fpName}));
  const res = await fetch(FB + '/BOM_EDITS/' + encodeURIComponent(code) + '.json', {
    method: 'PUT',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(erp)
  });
  if (!res.ok) throw new Error('HTTP ' + res.status);
}

// 완제품 목록
function renderFPList() {
  const q = document.getElementById('fpSearch').value.trim().toLowerCase();
  const items = q ? FG.filter(f => f.name.toLowerCase().includes(q) || f.code.toLowerCase().includes(q)) : FG;
  document.getElementById('fpCount').textContent = items.length;
  document.getElementById('fpList').innerHTML = items.map(fp => {
    const cnt = (bom[fp.code]||[]).length;
    const isNew = fp.isNew || NEW_FP.includes(fp.code);
    return `<div class="fp-item ${curFP&&curFP.code===fp.code?'sel':''} ${isNew?'is-new':''}" onclick="selectFP('${fp.code}','${fp.name.replace(/'/g,"\\'")}")">
      <span class="fp-code">${fp.code}</span>
      <span class="fp-name">${fp.name}</span>
      ${isNew ? '<span class="new-badge">NEW</span>' : ''}
      ${cnt>0 ? `<span class="fp-badge">${cnt}</span>` : ''}
    </div>`;
  }).join('');
}
function filterFP() { renderFPList(); }

function selectFP(code, name) {
  curFP = {code, name};
  const bar = document.getElementById('selBar');
  bar.classList.remove('empty');
  bar.innerHTML = `<span class="code-badge">${code}</span><span class="fp-title">${name}</span>`;
  renderFPList(); renderMatList(); renderBomList();
}

// 신규 완제품 추가
function openAddFpModal() {
  document.getElementById('newFpCode').value = '';
  document.getElementById('newFpName').value = '';
  document.getElementById('addFpErr').textContent = '';
  document.getElementById('addFpModal').classList.add('open');
  setTimeout(() => document.getElementById('newFpCode').focus(), 80);
}
function closeAddFp() { document.getElementById('addFpModal').classList.remove('open'); }
function confirmAddFp() {
  const code = document.getElementById('newFpCode').value.trim().toUpperCase();
  const name = document.getElementById('newFpName').value.trim();
  const err = document.getElementById('addFpErr');
  if (!code) { err.textContent = '품목코드를 입력하세요.'; return; }
  if (!name) { err.textContent = '완제품명을 입력하세요.'; return; }
  if (!/^P-\d+$/.test(code)) { err.textContent = '형식 오류: P-숫자 (예: P-576)'; return; }
  if (FG.find(f => f.code === code)) { err.textContent = code + ' 코드가 이미 존재합니다.'; return; }
  FG.push({code, name, isNew: true});
  NEW_FP.push(code);
  closeAddFp();
  renderFPList();
  selectFP(code, name);
}

// 구분 필터
function toggleGbn(btn) {
  const g = btn.dataset.g;
  if (activeGbn.has(g)) { activeGbn.delete(g); btn.classList.remove('on'); }
  else { activeGbn.add(g); btn.classList.add('on'); }
  renderMatList();
}

// 자재 목록
function renderMatList() {
  const listEl = document.getElementById('matList');
  if (!curFP) { listEl.innerHTML = '<div class="mat-empty">← 완제품을 선택하면 자재 목록이 표시됩니다</div>'; return; }
  const q = document.getElementById('matSearch').value.trim().toLowerCase();
  const checkedSet = getCheckedSet();
  let totalMatch = 0, totalAll = 0, html = '';
  GBN_ORDER.forEach(gbn => {
    if (!activeGbn.has(gbn)) return;
    const all = MAT[gbn] || [];
    const items = q ? all.filter(n => n.toLowerCase().includes(q)) : all;
    totalAll += all.length; totalMatch += items.length;
    if (items.length === 0 && q) return;
    const sel = items.filter(n => checkedSet.has(gbn+'|'+n)).length;
    html += `<div class="gbn-hd-row ${gbn}">
      <span class="gbn-hd ${gbn}">${gbn}</span>
      <span class="gbn-cnt">${items.length}개${sel>0?` · <strong style="color:var(--accent)">${sel}개 선택</strong>`:''}</span>
      <button class="gbn-sel-btn" onclick="selectAllGbn('${gbn}')">전체선택</button>
      <button class="gbn-sel-btn" onclick="deselectAllGbn('${gbn}')" style="margin-left:2px">해제</button>
    </div><div class="mat-grid">`;
    items.forEach(name => {
      const ck = checkedSet.has(gbn+'|'+name);
      const safe = name.replace(/'/g,"\\'").replace(/"/g,'&quot;');
      html += `<div class="mi ${ck?'ck':''}" onclick="toggleMat(this,'${gbn}','${safe}')">
        <input type="checkbox" ${ck?'checked':''} onclick="event.stopPropagation();toggleMat(this.closest('.mi'),'${gbn}','${safe}')">
        <label>${name}</label>
      </div>`;
    });
    html += '</div>';
  });
  if (!html) html = '<div class="mat-empty">검색 결과가 없습니다</div>';
  listEl.innerHTML = html;
  document.getElementById('matchInfo').textContent = q ? `${totalMatch} / ${totalAll}개 표시` : `총 ${totalAll}개`;
  GBN_ORDER.forEach(g => { const el = document.getElementById('gcnt-'+g); if(el) el.textContent = (MAT[g]||[]).length; });
}

function getCheckedSet() {
  const s = new Set();
  if (!curFP) return s;
  (bom[curFP.code]||[]).forEach(m => s.add(m.gbn+'|'+m.name));
  return s;
}

function toggleMat(el, gbn, name) {
  if (!curFP) { toast('완제품을 먼저 선택하세요'); return; }
  const code = curFP.code;
  if (!bom[code]) bom[code] = [];
  const idx = bom[code].findIndex(m => m.gbn===gbn && m.name===name);
  if (idx >= 0) {
    bom[code].splice(idx, 1);
    el.classList.remove('ck'); const cb = el.querySelector('input'); if(cb) cb.checked = false;
  } else {
    bom[code].push({gbn, name});
    el.classList.add('ck'); const cb = el.querySelector('input'); if(cb) cb.checked = true;
  }
  renderBomList(); updateStats(); renderFPList();
  refreshSectionCount(gbn);
}

function refreshSectionCount(gbn) {
  const checkedSet = getCheckedSet();
  const q = document.getElementById('matSearch').value.trim().toLowerCase();
  const items = q ? (MAT[gbn]||[]).filter(n=>n.toLowerCase().includes(q)) : (MAT[gbn]||[]);
  const cnt = items.filter(n=>checkedSet.has(gbn+'|'+n)).length;
  document.querySelectorAll('.gbn-hd-row').forEach(row => {
    if (row.classList.contains(gbn)) {
      const cntEl = row.querySelector('.gbn-cnt');
      if (cntEl) cntEl.innerHTML = `${items.length}개${cnt>0?` · <strong style="color:var(--accent)">${cnt}개 선택</strong>`:''}`;
    }
  });
}

function selectAllGbn(gbn) {
  if (!curFP) return;
  const q = document.getElementById('matSearch').value.trim().toLowerCase();
  const items = q ? (MAT[gbn]||[]).filter(n=>n.toLowerCase().includes(q)) : (MAT[gbn]||[]);
  const code = curFP.code;
  if (!bom[code]) bom[code]=[];
  items.forEach(name => { if(!bom[code].find(m=>m.gbn===gbn&&m.name===name)) bom[code].push({gbn,name}); });
  renderMatList(); renderBomList(); updateStats(); renderFPList();
}
function deselectAllGbn(gbn) {
  if (!curFP) return;
  const q = document.getElementById('matSearch').value.trim().toLowerCase();
  const items = new Set(q ? (MAT[gbn]||[]).filter(n=>n.toLowerCase().includes(q)) : (MAT[gbn]||[]));
  const code = curFP.code;
  if (bom[code]) bom[code] = bom[code].filter(m=>!(m.gbn===gbn&&items.has(m.name)));
  renderMatList(); renderBomList(); updateStats(); renderFPList();
}

// BOM 결과
function renderBomList() {
  const hdr = document.getElementById('bomFpHeader');
  const list = document.getElementById('bomList');
  const cnt = document.getElementById('bomCount');
  if (!curFP) {
    hdr.classList.add('empty'); hdr.innerHTML = '<span class="nm">완제품을 선택하세요</span>';
    list.innerHTML = '<div class="bom-empty">선택된 자재가 없습니다</div>'; cnt.textContent = ''; return;
  }
  hdr.classList.remove('empty');
  hdr.innerHTML = `<span class="code">${curFP.code}</span><span class="nm">${curFP.name}</span>`;
  const items = bom[curFP.code]||[];
  cnt.textContent = items.length ? `${items.length}개` : '';
  if (!items.length) { list.innerHTML = '<div class="bom-empty">위에서 자재를 체크하세요</div>'; return; }
  list.innerHTML = items.map((m,i)=>
    `<div class="bom-item">
      <span style="font-size:10px;color:var(--sub);width:16px;flex-shrink:0">${i+1}</span>
      <span class="tag ${m.gbn}">${m.gbn}</span>
      <span class="bom-name">${m.name}</span>
      <button class="del-btn" onclick="removeMat(${i})">✕</button>
    </div>`
  ).join('');
}

function removeMat(idx) {
  if (!curFP) return;
  bom[curFP.code].splice(idx, 1);
  renderMatList(); renderBomList(); updateStats(); renderFPList();
}

// 저장 → Firebase 전송
async function saveCurrent() {
  if (!curFP) { toast('완제품을 먼저 선택하세요'); return; }
  const items = bom[curFP.code] || [];
  if (!items.length) { toast('원재료를 1개 이상 선택하세요'); return; }
  const btn = document.getElementById('saveBtn');
  const statusEl = document.getElementById('saveStatus');
  btn.disabled = true; btn.textContent = '전송 중...';
  try {
    await saveToFirebase(curFP.code, curFP.name, items);
    btn.textContent = '✔ ERP 전송 완료';
    statusEl.textContent = `[${curFP.code}] ${curFP.name} — ${new Date().toLocaleTimeString()} 저장`;
    toast(`✅ ${curFP.name} → ERP LOT추적 즉시 반영`);
    renderFPList();
    setTimeout(() => { btn.disabled = false; btn.textContent = '💾 저장 → ERP 전송'; }, 2500);
  } catch(e) {
    btn.disabled = false; btn.textContent = '💾 저장 → ERP 전송';
    toast('❌ 저장 실패: ' + e.message);
  }
}

function clearCurrentBom() {
  if (!curFP) return;
  if (!confirm(`[${curFP.code}] ${curFP.name} BOM을 초기화할까요?`)) return;
  delete bom[curFP.code];
  renderMatList(); renderBomList(); updateStats(); renderFPList();
}

function updateStats() {
  const fpCnt = Object.keys(bom).filter(k=>bom[k]&&bom[k].length>0).length;
  const mCnt = Object.values(bom).reduce((s,a)=>s+(a?a.length:0),0);
  document.getElementById('globalStats').innerHTML =
    `전체 BOM 등록: <strong>${fpCnt}</strong>개 완제품, <strong>${mCnt}</strong>개 자재 매핑`;
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

// 전체 BOM 모달
function openAllBom() {
  const body = document.getElementById('allBomBody');
  const entries = Object.entries(bom).filter(([k,v])=>v&&v.length>0);
  if (!entries.length) {
    body.innerHTML = '<p style="text-align:center;color:var(--sub);padding:24px">등록된 BOM이 없습니다</p>';
  } else {
    body.innerHTML = entries.map(([code,mats])=>{
      const fp = FG.find(f=>f.code===code); const nm = fp?fp.name:code;
      const rows = mats.map((m,i)=>
        `<tr><td style="padding:4px 8px;color:var(--sub)">${i+1}</td>
         <td style="padding:4px 8px"><span class="tag ${m.gbn}">${m.gbn}</span></td>
         <td style="padding:4px 8px;font-size:12px">${m.name}</td></tr>`).join('');
      return `<div style="margin-bottom:12px;border:1px solid var(--border);border-radius:8px;overflow:hidden">
        <div style="background:var(--primary-light);padding:7px 12px;font-weight:700;font-size:13px;color:var(--primary)">
          <span style="background:var(--primary);color:#fff;font-size:10px;padding:2px 7px;border-radius:4px;margin-right:7px">${code}</span>${nm}
          <span style="float:right;font-size:11px;color:var(--sub)">${mats.length}개 자재</span>
        </div><table style="width:100%"><tbody>${rows}</tbody></table></div>`;
    }).join('');
  }
  document.getElementById('allBomModal').classList.add('open');
}
function closeModal() { document.getElementById('allBomModal').classList.remove('open'); }

// CSV 내보내기
function exportCSV() {
  const entries = Object.entries(bom).filter(([k,v])=>v&&v.length>0);
  if (!entries.length) { toast('등록된 BOM이 없습니다'); return; }
  let csv = '﻿완제품코드,완제품명,자재구분,자재명\n';
  entries.forEach(([code,mats])=>{
    const fp = FG.find(f=>f.code===code); const nm = fp?fp.name:code;
    mats.forEach(m => { csv += `"${code}","${nm}","${m.gbn}","${m.name}"
`; });
  });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));
  a.download = '위드프레쉬_BOM매핑.csv'; a.click();
  toast('CSV 다운로드됨');
}

// 시작
loadFromFirebase();
renderMatList();
</script>
</body>
</html>
